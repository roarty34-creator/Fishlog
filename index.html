<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FishLog</title>

<style>
:root{
  --bg:#0b1220;
  --card:#101a2e;
  --text:#e8eefc;
  --muted:#9fb0d0;
  --accent:#4f8cff;
  --border:#20304d;
}

body{
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: radial-gradient(1200px 800px at 20% 0%, #142040 0%, var(--bg) 55%);
  color:var(--text);
  padding:20px;
}

h2{ margin-top:0; }

button{
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
  padding: 10px 14px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 700;
  transition: transform .06s ease, border-color .2s ease;
}

button:hover{ border-color: var(--accent); }
button:active{ transform: scale(0.98); }

.topnav{
  display:inline-flex;
  background:#0e1730;
  padding:6px;
  border-radius:999px;
  border:1px solid var(--border);
  gap:6px;
  margin-bottom:20px;
}

.navbtn{
  border:none;
  background:transparent;
  padding:8px 18px;
  border-radius:999px;
  font-weight:700;
  color:var(--text);
}

.navbtn.active{
  background:var(--accent);
  color:#071022;
}

.card{
  background: linear-gradient(180deg, #122042 0%, var(--card) 100%);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px;
  margin: 10px 0;
  box-shadow: 0 10px 25px rgba(0,0,0,.25);
}

input{
  width:100%;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #0e1730;
  color: var(--text);
  margin-bottom:10px;
}

label.small{
  display:block;
  margin: 10px 0 6px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}

section{ display:none; }
</style>
</head>

<body>
<h2>FishLog</h2>

<div class="topnav">
  <button class="navbtn" id="btnAdd" onclick="show('add')">Add</button>
  <button class="navbtn" id="btnLog" onclick="show('log')">Log</button>
</div>

<section id="add">
  <div class="card">
    <h3 style="margin:0 0 10px">Add Catch</h3>

    <label class="small">Spesie</label>
    <input id="species" placeholder="bv. Kaapse Kabeljou" autocomplete="off">

    <label class="small">Plek</label>
    <input id="place" placeholder="bv. Stilbaai / Die Punt" autocomplete="off">

    <label class="small">Koördinate</label>
    <div style="display:flex; gap:10px; align-items:center;">
      <button type="button" onclick="getGPS()">Kry GPS</button>
      <input id="coords" placeholder="-34.37, 20.85" readonly autocomplete="off">
    </div>

    <label class="small">Lengte (cm)</label>
    <input id="length" placeholder="bv. 65" autocomplete="off">

    <label class="small">Foto</label>
    <input id="photo" type="file" accept="image/*" capture="environment" autocomplete="off">

    <button class="navbtn active" style="margin-top:10px" onclick="saveCatch()">Save</button>
  </div>
</section>

<section id="log">
  <h3>Catch Log</h3>

  <div style="display:flex; gap:10px; margin-bottom:12px; flex-wrap:wrap;">
    <button onclick="clearAll()">Clear all</button>
  </div>

  <div id="list"></div>
</section>

<script>
(() => {
  const KEY = "fishlog";
  const el = (id) => document.getElementById(id);

  const species = el("species");
  const place   = el("place");
  const coords  = el("coords");
  const length  = el("length");
  const photo   = el("photo");
  const list    = el("list");

  function getAll(){
    return JSON.parse(localStorage.getItem(KEY) || "[]");
  }

  function saveAll(data){
    localStorage.setItem(KEY, JSON.stringify(data));
  }

  function setActive(id){
    el("btnAdd").classList.toggle("active", id === "add");
    el("btnLog").classList.toggle("active", id === "log");
  }

  function show(id){
    document.querySelectorAll("section").forEach(s => s.style.display="none");
    el(id).style.display="block";
    setActive(id);
    if(id === "log") loadLog();
  }

  function getGPS(){
    if(!navigator.geolocation){
      alert("GPS nie beskikbaar nie.");
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const lat = pos.coords.latitude.toFixed(6);
        const lon = pos.coords.longitude.toFixed(6);
        coords.value = lat + ", " + lon;
      },
      () => alert("Kon nie ligging kry nie. Maak seker Location is aan."),
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  function fileToDataUrl(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result || ""));
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function openMap(coordStr){
    if(!coordStr) return;
    const url = "https://www.google.com/maps?q=" + encodeURIComponent(coordStr);
    window.open(url, "_blank");
  }

  function directionsTo(coordStr){
    if(!coordStr) return;
    const url = "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(coordStr);
    window.open(url, "_blank");
  }

  function saveCatch(){
    const data = getAll();

    const newCatch = {
      id: Date.now(),
      species: species.value.trim(),
      place: place.value.trim(),
      coords: coords.value.trim(),
      length: length.value.trim(),
      photo: "",
      date: new Date().toLocaleDateString()
    };

    // Geen foto gekies nie
    if(!photo || !photo.files || !photo.files[0]){
      data.push(newCatch);
      saveAll(data);
      clearForm();
      show("log");
      return;
    }

    // Foto gekies -> maak base64
    fileToDataUrl(photo.files[0]).then(photoData => {
      newCatch.photo = photoData || "";
      data.push(newCatch);
      saveAll(data);
      clearForm();
      show("log");
    }).catch(() => {
      alert("Foto kon nie gelees word nie. Probeer weer.");
    });
  }

  function clearForm(){
    species.value = "";
    place.value = "";
    coords.value = "";
    length.value = "";
    if(photo) photo.value = "";
  }

  function loadLog(){
    list.innerHTML = "";
    const data = getAll();

    if(data.length === 0){
      list.innerHTML = `<div class="card"><small>No catches yet.</small></div>`;
      return;
    }

    data.slice().reverse().forEach(c => {
      const s = (x)=> (x ?? "").toString().replaceAll("<","&lt;").replaceAll(">","&gt;");
      const safeCoords = s(c.coords);
      const safeId = s(c.id);

      list.innerHTML += `
        <div class="card">
          <b>${s(c.species)}</b><br>
          ${s(c.place)} • ${s(c.length)}cm<br>
          <small>${s(c.date)}</small><br>

          ${c.coords ? `
            <small>📍 ${safeCoords}</small><br>
            <button onclick="openMap(this.dataset.c)" data-c="${safeCoords}">Maps</button>
            <button onclick="directionsTo(this.dataset.c)" data-c="${safeCoords}">Directions</button>
            <br><br>
          ` : `<br>`}

          ${c.photo ? `
            <img src="${c.photo}" alt="Catch photo"
              style="width:100%;border-radius:14px;margin-top:10px;border:1px solid var(--border);" />
            <br><br>
          ` : ``}

          <button onclick="editCatch(${safeId})">Edit</button>
          <button onclick="deleteCatch(${safeId})">Delete</button>
        </div>
      `;
    });
  }

  function deleteCatch(id){
    const ok = confirm("Delete hierdie vang?");
    if(!ok) return;
    const data = getAll().filter(c => String(c.id) !== String(id));
    saveAll(data);
    loadLog();
  }

  function editCatch(id){
    const data = getAll();
    const idx = data.findIndex(c => String(c.id) === String(id));
    if(idx === -1) return;

    const c = data[idx];

    const newSpecies = prompt("Spesie:", c.species || "");
    if(newSpecies === null) return;

    const newPlace = prompt("Plek:", c.place || "");
    if(newPlace === null) return;

    const newCoords = prompt("Koördinate:", c.coords || "");
    if(newCoords === null) return;

    const newLength = prompt("Lengte (cm):", c.length || "");
    if(newLength === null) return;

    c.species = newSpecies.trim();
    c.place   = newPlace.trim();
    c.coords  = newCoords.trim();
    c.length  = newLength.trim();

    saveAll(data);
    loadLog();
  }

  function clearAll(){
    const ok = confirm("Delete ALL catches?");
    if(!ok) return;
    saveAll([]);
    loadLog();
  }

  // Maak beskikbaar vir HTML onclick=""
  window.show = show;
  window.saveCatch = saveCatch;
  window.getGPS = getGPS;
  window.openMap = openMap;
  window.directionsTo = directionsTo;
  window.deleteCatch = deleteCatch;
  window.editCatch = editCatch;
  window.clearAll = clearAll;

  // START
  show("add");
})();
</script>

</body>
</html>

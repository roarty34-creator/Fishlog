<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nicoleen</title>
  <link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b1220">

<style>
:root{
  --bg:#0b1220;
  --card:#101a2e;
  --text:#e8eefc;
  --accent:#4f8cff;
  --border:#20304d;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:20px;
}

button{
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
  padding:8px 14px;
  border-radius:999px;
  font-weight:700;
}

.topnav{
  display:flex;
  gap:8px;
  margin-bottom:20px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:18px;
  margin-bottom:12px;
}

input, select{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#0e1730;
  color:white;
  margin-bottom:10px;
}

.thumb{
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:10px;
}
section{display:none;}
</style>
</head>
<body>

<h2>Nicoleen</h2>

<div class="topnav">
  <button onclick="show('add')">Add</button>
  <button onclick="show('log')">Log</button>
</div>

<section id="add">
<div class="card">

<label>Spesie</label>
<select id="species">
<option value="">Kies spesie…</option>
<option>Kaapse Kabeljou</option>
<option>Geelstert</option>
<option>Bonnie</option>
<option>Rooi Roman</option>
<option>Snapper</option>
<option>Silver (Bastermeid)</option>
<option>Rooi Steenbras</option>
<option>Yellow Belly (Rockcod)</option>
</select>

<label>Plek</label>
<input id="place">

<label>Koördinate</label>
<div style="display:flex; gap:10px;">
<button type="button" onclick="getGPS()">Kry GPS</button>
<input id="coords" readonly>
</div>

<label>Lengte (cm)</label>
<input id="length">

<label>Foto</label>
<div style="display:flex; gap:10px;">
<button type="button" onclick="photoCamera.click()">📷 Kamera</button>
<button type="button" onclick="photoGallery.click()">🖼 Gallery</button>
</div>
<input id="photoCamera" type="file" accept="image/*" capture="environment" style="display:none;">
<input id="photoGallery" type="file" accept="image/*" style="display:none;">

<button onclick="saveCatch()">Save</button>

</div>
</section>

<section id="log">
<div id="list"></div>
<button onclick="clearAll()">Clear All</button>
</section>

<script>
const KEY="fishlog";

const species=document.getElementById("species");
const place=document.getElementById("place");
const coords=document.getElementById("coords");
const length=document.getElementById("length");
const list=document.getElementById("list");
const photoCamera=document.getElementById("photoCamera");
const photoGallery=document.getElementById("photoGallery");

let currentPhoto="";

function show(id){
document.querySelectorAll("section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
if(id==="log") loadLog();
}

function getAll(){
return JSON.parse(localStorage.getItem(KEY)||"[]");
}

function saveAll(data){
localStorage.setItem(KEY,JSON.stringify(data));
}

function getGPS(){
navigator.geolocation.getCurrentPosition(pos=>{
coords.value=pos.coords.latitude.toFixed(6)+", "+pos.coords.longitude.toFixed(6);
});
}

photoCamera.onchange=photoGallery.onchange=async function(e){
const file=e.target.files[0];
if(!file) return;
const reader=new FileReader();
reader.onload=()=>currentPhoto=reader.result;
reader.readAsDataURL(file);
};

function saveCatch(){
const data=getAll();
data.push({
id:Date.now(),
species:species.value,
place:place.value,
coords:coords.value,
length:length.value,
photo:currentPhoto,
date:new Date().toLocaleDateString()
});
saveAll(data);

species.selectedIndex=0;
place.value="";
coords.value="";
length.value="";
currentPhoto="";
photoCamera.value="";
photoGallery.value="";

show("log");
}

function loadLog(){
list.innerHTML="";
const data=getAll().sort((a,b)=>b.id-a.id);

if(!data.length){
list.innerHTML="<div class='card'>No catches yet.</div>";
return;
}

data.forEach(c=>{
list.innerHTML+=`
<div class="card">
<b>${c.species||"-"}</b><br>
${c.place||"-"} • ${c.length||"-"}cm<br>
<small>${c.date}</small><br><br>

${c.coords?`
📍 ${c.coords}<br>
<button onclick="openMap('${encodeURIComponent(c.coords)}')">Maps</button>
<button onclick="directionsTo('${encodeURIComponent(c.coords)}')">Directions</button><br><br>`:""}

${c.photo?`
<img src="${c.photo}" class="thumb"><br>
<button onclick="viewPhoto('${c.id}')">View Photo</button><br><br>`:""}

<button onclick="editCatch(${c.id})">Edit</button>
<button onclick="deleteCatch(${c.id})">Delete</button>
<button onclick="shareCatch(${c.id})">Share</button>
</div>`;
});
}

function deleteCatch(id){
saveAll(getAll().filter(c=>c.id!=id));
loadLog();
}

function editCatch(id){
const data=getAll();
const c=data.find(x=>x.id==id);
if(!c) return;

c.species=prompt("Spesie:",c.species)||c.species;
c.place=prompt("Plek:",c.place)||c.place;
c.coords=prompt("Koördinate:",c.coords)||c.coords;
c.length=prompt("Lengte:",c.length)||c.length;

saveAll(data);
loadLog();
}

function clearAll(){
if(confirm("Delete all?")){
saveAll([]);
loadLog();
}
}

function openMap(c){
window.open("https://www.google.com/maps?q="+decodeURIComponent(c));
}

function directionsTo(c){
window.open("https://www.google.com/maps/dir/?api=1&destination="+decodeURIComponent(c));
}

function viewPhoto(id){
const c=getAll().find(x=>x.id==id);
if(!c) return;
const w=window.open();
w.document.write("<img src='"+c.photo+"' style='max-width:100%'>");
}

async function shareCatch(id){
const c=getAll().find(x=>x.id==id);
if(!c) return;

const text=`FishLog
Spesie: ${c.species}
Plek: ${c.place}
Lengte: ${c.length}cm
Koördinate: ${c.coords}
Datum: ${c.date}`;

if(navigator.share){
navigator.share({title:"FishLog",text});
}else{
navigator.clipboard.writeText(text);
alert("Gekopieer!");
}
}

show("add");
  if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js");
  }
</script>

</body>
</html>

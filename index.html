<!DOCTYPE html>
<html lang="af">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FishLog</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    :root{
      --bg:#0b1220;
      --card:#162040;
      --text:#e7eefc;
      --brand:#2c5cff;
      --muted:rgba(231,238,252,.7);
      --danger:#ff3b3b;
      --line:rgba(255,255,255,.12);
    }
    body{ margin:0; font-family:Arial, system-ui, sans-serif; background:var(--bg); color:var(--text); }
    main{ padding:15px; max-width:650px; margin:auto; }
    nav{ display:flex; gap:8px; margin-bottom:10px; position:sticky; top:0; background:var(--bg); padding:10px 0; z-index:5; }
    button{
      padding:10px 14px; border-radius:10px; border:none; background:var(--brand); color:white;
      font-weight:600;
    }
    .secondary{ background:#3a3f50; }
    .danger{ background:var(--danger); }
    .card{ background:var(--card); padding:12px; border-radius:14px; margin-top:12px; border:1px solid var(--line); }
    input, select, textarea{
      width:100%; padding:10px; margin-top:6px; border-radius:10px; border:none; outline:none;
      background:#0f1730; color:var(--text);
    }
    label{ display:block; margin-top:10px; font-weight:700; }
    .row{ display:flex; gap:8px; align-items:center; }
    .small{ font-size:12px; color:var(--muted); margin-top:6px; }
    #map{ height:300px; margin-top:10px; border-radius:14px; overflow:hidden; border:1px solid var(--line); }
    img{ max-width:100%; border-radius:12px; margin-top:8px; border:1px solid var(--line); }
    hr{ border:none; border-top:1px solid var(--line); margin:12px 0; }
  </style>
</head>

<body>
<main>

  <nav>
    <button type="button" onclick="show('log')">Log</button>
    <button type="button" onclick="show('add')">Add</button>
    <button type="button" onclick="show('stats')">Stats</button>
  </nav>

  <!-- LOG -->
  <section id="log">
    <div class="card">
      <b>Filter</b>
      <div class="small">Kies ’n trip om net daai vangste te sien.</div>
      <select id="tripFilter"></select>
    </div>

    <div id="list"></div>
  </section>

  <!-- ADD -->
  <section id="add" style="display:none">
    <div class="card">
      <label>Spesie</label>
      <input id="species" placeholder="bv. Kabeljou" 

      <label>Lengte (cm)</label>
      <input id="length" type="number" inputmode="decimal" placeholder="bv. 78" />

      <label>Gewig (kg)</label>
      <input id="weight" type="number" inputmode="decimal" placeholder="bv. 6.5" />

      <label>Plek</label>
      <input id="place" placeholder="bv. Stilbaai / Goukou mond" />

      <label>Koördinate</label>
      <div class="row">
        <button type="button" class="secondary" onclick="getGPS()">Kry GPS</button>
        <input id="coords" placeholder="lat, lon" readonly />
      </div>
      <div class="small">Tip: GPS werk net as jou browser Location permission “Allow” is.</div>

      <label>Foto</label>
      <div class="row">
        <button type="button" onclick="document.getElementById('cam').click()">Camera</button>
        <button type="button" class="secondary" onclick="document.getElementById('gal').click()">Gallery</button>
      </div>
      <input id="cam" type="file" accept="image/*" capture="environment" hidden />
      <input id="gal" type="file" accept="image/*" hidden />
      <div id="photoPreview"></div>

      <label>Notas</label>
      <textarea id="notes" rows="3" placeholder="aas/lure, gety, wind, ens."></textarea>

      <div class="row" style="margin-top:12px">
        <button type="button" onclick="saveCatch()">Save</button>
        <button type="button" class="secondary" onclick="clearForm()">Clear</button>
      </div>

      <div id="status" class="small"></div>
    </div>

    <div id="map"></div>
  </section>

  <!-- STATS -->
  <section id="stats" style="display:none">
    <div class="card">
      <b>Stats</b>
      <div id="statsBox" class="small" style="margin-top:8px"></div>

      <hr>

      <div class="row">
        <button type="button" onclick="exportData()">Export Backup</button>
        <button type="button" class="secondary" onclick="document.getElementById('importFile').click()">Import Backup</button>
        <input type="file" id="importFile" accept="application/json" hidden />
      </div>
    </div>
  </section>

</main>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>

  const KEY = "fishlog";
  let editingId = null;

  const el = (id) => document.getElementById(id);

  const species = el("species");
  const trip = el("trip");
  const length = el("length");
  const weight = el("weight");
  const place = el("place");
  const coords = el("coords");
  const notes = el("notes");
  const tripFilter = el("tripFilter");

  /* ---------- NAV ---------- */

  function show(id){
    document.querySelectorAll("section")
      .forEach(s => s.style.display = "none");

    const section = el(id);
    if(section) section.style.display = "block";

    if(id === "log") loadLog();
    if(id === "stats") renderStats();
    if(id === "add") fillTripSelect();
  }

  window.show = show;

  /* ---------- STORAGE ---------- */

  function getAll(){
    return JSON.parse(localStorage.getItem(KEY) || "[]");
  }

  function saveAll(data){
    localStorage.setItem(KEY, JSON.stringify(data));
  }

  /* ---------- TRIPS ---------- */

  function getTrips(){
    const data = getAll();
    const set = new Set();

    data.forEach(c => {
      if(c.trip) set.add(String(c.trip).trim());
    });

    set.add("Geen");
    return Array.from(set).filter(Boolean).sort();
  }

  function fillTripSelect(selected){
    const sel = el("trip");
    if(!sel) return;

    const trips = getTrips();

    sel.innerHTML = trips
      .map(t => `<option value="${t}">${t}</option>`)
      .join("");

    if(selected && trips.includes(selected)){
      sel.value = selected;
    }
  }

  function newTrip(){
    const name = prompt("Naam van nuwe Trip?");
    if(!name) return;

    const clean = name.trim();
    if(!clean) return;

    fillTripSelect(clean);
  }

  window.newTrip = newTrip;

  /* ---------- SAVE ---------- */

  function saveCatch(){
    const data = getAll();

    const item = {
      id: editingId || Date.now(),
      species: species.value.trim(),
      trip: trip.value.trim() || "Geen",
      length: Number(length.value) || 0,
      weight: Number(weight.value) || 0,
      place: place.value.trim(),
      coords: coords.value.trim(),
      notes: notes.value.trim()
    };

    if(editingId){
      const index = data.findIndex(c => c.id === editingId);
      if(index !== -1) data[index] = item;
    } else {
      data.push(item);
    }

    saveAll(data);
    clearForm();
    show("log");
  }

  window.saveCatch = saveCatch;

  /* ---------- CLEAR ---------- */

  function clearForm(){
    editingId = null;
    species.value = "";
    trip.value = "";
    length.value = "";
    weight.value = "";
    place.value = "";
    coords.value = "";
    notes.value = "";
  }

  /* ---------- LOG ---------- */

  function loadLog(){
    const list = el("list");
    if(!list) return;

    const data = getAll();
    const filter = tripFilter?.value;

    const filtered = filter
      ? data.filter(c => c.trip === filter)
      : data;

    list.innerHTML = filtered.map(c => `
      <div class="card">
        <b>${c.species}</b><br>
        Trip: ${c.trip}<br>
        ${c.length} cm • ${c.weight} kg<br>
        ${c.place}
      </div>
    `).join("");

    fillTripFilter();
  }

  function fillTripFilter(){
    if(!tripFilter) return;

    const trips = getTrips();

    tripFilter.innerHTML =
      `<option value="">Alles</option>` +
      trips.map(t => `<option value="${t}">${t}</option>`).join("");
  }

  tripFilter?.addEventListener("change", loadLog);

  /* ---------- STATS ---------- */

  function renderStats(){
    console.log("Stats rendering...");
  }

  /* ---------- START ---------- */

  fillTripSelect();
  loadLog();
  show("log");

})();
  </script>               // ← en dan sluit jy die IIFE
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FishLog</title>
<style>
body{background:#0b1220;color:white;font-family:Arial;margin:0}
header{padding:15px;text-align:center;background:#162040}
button{width:100%;padding:12px;margin-top:8px;background:#2c5cff;color:white;border:none;border-radius:8px}
section{padding:15px;display:none}
section.active{display:block}
.card{background:#162040;padding:10px;border-radius:8px;margin-top:10px}
</style>
</head>
<body>

<header>FishLog</header>

<button onclick="show('log')">Logboek</button>
<button onclick="show('add')">Add</button>

<section id="log" class="active"></section>

<section id="add">
<button onclick="addTest()">Add Test Vang</button>
</section>

<script>
function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function addTest(){
let data=JSON.parse(localStorage.getItem("fishlog")||"[]");
data.push({species:"Test Fish",date:new Date().toLocaleString()});
localStorage.setItem("fishlog",JSON.stringify(data));
load();
}

function load(){
let log=document.getElementById("log");
let data=JSON.parse(localStorage.getItem("fishlog")||"[]");
log.innerHTML="";
data.forEach(d=>{
log.innerHTML+=`<div class="card">${d.species}<br>${d.date}</div>`;
});
}

load();
</script>

</body>
</html>

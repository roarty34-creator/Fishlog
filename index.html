<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FishLog</title>
<style>
:root{
  --bg:#0b1220;
  --card:#101a2e;
  --text:#e8eefc;
  --muted:#9fb0d0;
  --accent:#4f8cff;
  --border:#20304d;
}

body{
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: radial-gradient(1200px 800px at 20% 0%, #142040 0%, var(--bg) 55%);
  color:var(--text);
  padding:20px;
}

h2{
  margin-top:0;
}

button{
  background: #1a2742;
  color: var(--text);
  border: 1px solid var(--border);
  padding: 10px 14px;
  border-radius: 14px;
  font-weight: 600;
  cursor: pointer;
  margin:5px;
}

button:hover{
  border-color:#365a9a;
}

.card{
  background: linear-gradient(180deg, #122042 0%, var(--card) 100%);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px;
  margin: 10px 0;
  box-shadow: 0 10px 25px rgba(0,0,0,.25);
}

input{
  width:100%;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #0e1730;
  color: var(--text);
  margin-bottom:10px;
}

section{
  display:none;
}
</style>
</head>
<body>

<h2>FishLog</h2>

<button onclick="show('add')">Add</button>
<button onclick="show('log')">Log</button>

<section id="add">
<h3>Add Catch</h3>
<input id="species" placeholder="Species"><br><br>
<input id="place" placeholder="Place"><br><br>
<input id="length" placeholder="Length (cm)"><br><br>
<button onclick="saveCatch()">Save</button>
</section>

<section id="log">
<h3>Catch Log</h3>
<div id="list"></div>
</section>

<script>
(() => {

const KEY = "fishlog";

const el = id => document.getElementById(id);
const species = el("species");
const place = el("place");
const length = el("length");
const list = el("list");

function getAll(){
  return JSON.parse(localStorage.getItem(KEY) || "[]");
}

function saveAll(data){
  localStorage.setItem(KEY, JSON.stringify(data));
}

function saveCatch(){
  const data = getAll();
  data.push({
    species: species.value,
    place: place.value,
    length: length.value,
    date: new Date().toLocaleDateString()
  });
  saveAll(data);
  species.value="";
  place.value="";
  length.value="";
  show("log");
}

function loadLog(){
  list.innerHTML="";
  const data = getAll();
  data.forEach(c=>{
    list.innerHTML += `
      <div class="card">
        <b>${c.species}</b><br>
        ${c.place} • ${c.length}cm<br>
        <small>${c.date}</small>
      </div>
    `;
  });
}

function show(id){
  document.querySelectorAll("section").forEach(s=>s.style.display="none");
  el(id).style.display="block";
  if(id==="log") loadLog();
}

window.show = show;
window.saveCatch = saveCatch;

show("add");

})();
</script>

</body>
</html>

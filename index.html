<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FishLog</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b1220;
color:#e8eefc;
padding:18px;
}

.card{
background:#101a2e;
border-radius:16px;
padding:14px;
margin:10px 0;
}

button{
padding:10px 14px;
border-radius:999px;
border:1px solid #20304d;
background:#0e1730;
color:white;
cursor:pointer;
}

input,select{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid #20304d;
background:#0e1730;
color:white;
margin-bottom:10px;
}

#map{
height:350px;
border-radius:16px;
margin-top:10px;
}

img{
width:100%;
border-radius:12px;
margin-top:8px;
}
</style>
</head>

<body>

<h2>FishLog 🎣</h2>

<div>
<button onclick="show('add')">Add</button>
<button onclick="show('log')">Log</button>
<button onclick="show('map')">Map</button>
<button onclick="show('stats')">Stats</button>
</div>

<!-- ADD -->
<section id="add">

<div class="card">

<label>Spesie</label>
<select id="species">
<option value="">Kies spesie...</option>
<option>Kaapse Kabeljou</option>
<option>Geelstert</option>
<option>Bonnie</option>
<option>Rooi Roman</option>
<option>Snapper</option>
<option>Galjoen</option>
<option>Hottentot</option>
</select>

<label>Plek</label>
<input id="place">

<label>Koördinate</label>
<input id="coords" readonly>

<button onclick="getGPS()">📍 Kry GPS</button>
<button onclick="gpsAndSave()">📍 GPS + Save</button>

<label>Lengte (cm)</label>
<input id="length">

<label>Foto</label>
<input id="photo" type="file" accept="image/*">

<button onclick="saveCatch()">Save</button>

</div>

</section>

<!-- LOG -->
<section id="log">

<div class="card">
<button onclick="resetLog()">Reset All Data</button>
</div>

<div id="list"></div>

</section>

<!-- MAP -->
<section id="mapSection">

<div id="map"></div>

</section>

<!-- STATS -->
<section id="stats">

<div class="card">
<h3>Stats</h3>
<div id="statsBox"></div>
</div>

</section>

<script>

const KEY="fishlog"

function getAll(){
return JSON.parse(localStorage.getItem(KEY)||"[]")
}

function saveAll(d){
localStorage.setItem(KEY,JSON.stringify(d))
}

function show(id){

document.querySelectorAll("section").forEach(s=>s.style.display="none")

if(id==="map"){
document.getElementById("mapSection").style.display="block"
initMap()
renderMap()
}else{
document.getElementById(id).style.display="block"
}

if(id==="log") loadLog()
if(id==="stats") renderStats()

}

function getGPS(){

navigator.geolocation.getCurrentPosition(pos=>{

coords.value=pos.coords.latitude.toFixed(6)+","+pos.coords.longitude.toFixed(6)

})

}

function gpsAndSave(){

navigator.geolocation.getCurrentPosition(pos=>{

coords.value=pos.coords.latitude.toFixed(6)+","+pos.coords.longitude.toFixed(6)

saveCatch()

})

}

function saveCatch(){

const file=document.getElementById("photo").files[0]

const reader=new FileReader()

reader.onload=function(){

const data=getAll()

data.push({

id:Date.now(),

species:species.value,

place:place.value,

coords:coords.value,

length:length.value,

photo:reader.result,

date:new Date().toISOString().slice(0,10)

})

saveAll(data)

species.value=""
place.value=""
coords.value=""
length.value=""
document.getElementById("photo").value=""

show("log")

}

if(file) reader.readAsDataURL(file)
else reader.onload()

}

function loadLog(){

list.innerHTML=""

const data=getAll().reverse()

data.forEach(c=>{

list.innerHTML+=`

<div class="card">

<b>${c.species}</b><br>
${c.place} • ${c.length}cm<br>
${c.date}

${c.photo?`<img src="${c.photo}">`:""}

<br>

<button onclick="openMap('${c.coords}')">Maps</button>
<button onclick="directions('${c.coords}')">Directions</button>

<button onclick="deleteCatch(${c.id})">Delete</button>

</div>

`

})

}

function deleteCatch(id){

const data=getAll().filter(c=>c.id!==id)

saveAll(data)

loadLog()

}

function resetLog(){

if(confirm("Delete alles?")){

localStorage.clear()

loadLog()

}

}

function openMap(c){

window.open("https://maps.google.com/?q="+c)

}

function directions(c){

window.open("https://www.google.com/maps/dir/?api=1&destination="+c)

}

function renderStats(){

const data=getAll()

let kabeljou=0
let geelstert=0

data.forEach(c=>{

if(c.species==="Kaapse Kabeljou") kabeljou++
if(c.species==="Geelstert") geelstert++

})

statsBox.innerHTML=`
Kabeljou: ${kabeljou}<br>
Geelstert: ${geelstert}<br>
Total: ${data.length}
`

}

let map
let heat

function initMap(){

if(map) return

map=L.map("map").setView([-34.37,20.85],10)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)

}

function renderMap(){

if(!map) return

const data=getAll()

const pts=[]

data.forEach(c=>{

if(!c.coords) return

const p=c.coords.split(",")

const lat=parseFloat(p[0])
const lng=parseFloat(p[1])

L.marker([lat,lng]).addTo(map)

pts.push([lat,lng,0.5])

})

if(heat) map.removeLayer(heat)

heat=L.heatLayer(pts).addTo(map)

}

show("add")

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FishLog</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#0b1320;
color:white;
padding:10px;
}

h2{
text-align:center;
margin-top:5px;
}

.topnav{
text-align:center;
margin:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
background:#1f7ae0;
color:white;
font-weight:bold;
}

.card{
background:#162033;
margin:10px;
padding:15px;
border-radius:10px;
}

input,select{
width:100%;
padding:8px;
margin-top:8px;
margin-bottom:8px;
border-radius:8px;
border:none;
}

#map{
height:400px;
border-radius:10px;
}

.catchPhoto{
width:100%;
border-radius:10px;
margin-top:8px;
}

</style>
</head>

<body>

<h2>FishLog 🎣</h2>

<div class="topnav">
<button onclick="show('add')">Add</button>
<button onclick="show('log')">Log</button>
<button onclick="show('map')">Map</button>
<button onclick="show('stats')">Stats</button>
</div>

<!-- ADD -->

<div id="add" class="card">

<h3>Add Catch</h3>

<select id="species">
<option value="">Kies spesie</option>
<option>Kaapse Kabeljou</option>
<option>Geelstert</option>
<option>Bonnie</option>
<option>Snapper</option>
<option>Galjoen</option>
  <option>Kob</option>
<option>Steenbras</option>
<option>Wit Steenbras</option>
<option>Rooi Steenbras</option>
<option>Hottentot</option>
<option>Seventy Four</option>
<option>Raggie</option>
<option>Elf (Shad)</option>
<option>Leervis</option>
<option>Bonito</option>
<option>Tuna</option>
<option>Yellowtail (Eng)</option>
<option>Blacktail</option>
<option>Garrick</option>
<option>Hammerhead</option>
<option>Bronze Whaler</option>
<option>Skate</option>
<option>Ray</option>
<option>Squid (Kalfie)</option>
</select>

<input id="place" placeholder="Plek">

<input id="length" placeholder="Lengte cm">

<input id="coords" placeholder="GPS coords">

<button onclick="getGPS()">📍 Get GPS</button>

<input type="file" id="photo" accept="image/*" capture="environment">

<button onclick="saveCatch()">Save Catch</button>

</div>

<!-- LOG -->

<div id="log" class="card" style="display:none">

<h3>Log</h3>

<div id="logList"></div>

</div>

<!-- MAP -->

<div id="mapView" class="card" style="display:none">

<h3>Map</h3>

<div id="map"></div>

</div>

<!-- STATS -->

<div id="stats" class="card" style="display:none">

<h3>Stats</h3>

<div id="statsText"></div>

</div>

<script>

let map
let markers=[]
  function getMoonPhase(date){
  const lp = 2551443;
  const new_moon = new Date(1970,0,7,20,35,0);

  const phase = ((date.getTime() - new_moon.getTime())/1000) % lp;
  const moon = Math.floor(phase / (24*3600)) + 1;

  if(moon < 2) return "New Moon";
  if(moon < 7) return "Waxing";
  if(moon < 9) return "First Quarter";
  if(moon < 15) return "Waxing Gibbous";
  if(moon < 17) return "Full Moon";
  if(moon < 22) return "Waning";
  if(moon < 24) return "Last Quarter";
  return "Waning Crescent";
}

function getTideType(phase){

  if(phase === "New Moon" || phase === "Full Moon"){
    return "Spring Tide";
  }

  if(phase === "First Quarter" || phase === "Last Quarter"){
    return "Neap Tide";
  }

  return "Normal Tide";
}

function show(id){

document.getElementById("add").style.display="none"
document.getElementById("log").style.display="none"
document.getElementById("mapView").style.display="none"
document.getElementById("stats").style.display="none"

if(id==="map"){
document.getElementById("mapView").style.display="block"
renderMap()
setTimeout(()=>{if(map) map.invalidateSize()},200)
}
else{
document.getElementById(id).style.display="block"
}

if(id==="log") renderLog()
if(id==="stats") renderStats()

}

function getAll(){
return JSON.parse(localStorage.getItem("fishlog")||"[]")
}

function saveAll(data){
localStorage.setItem("fishlog",JSON.stringify(data))
}

async function saveCatch(){
  const now = new Date()
const moon = getMoonPhase(now)
const tide = getTideType(moon)
  
const species=document.getElementById("species").value
const place=document.getElementById("place").value
const length=document.getElementById("length").value
const coords=document.getElementById("coords").value

if(!species) return alert("Kies spesie")

let photo=""

const file=document.getElementById("photo").files[0]

if(file){
photo=await toBase64(file)
}

const date = document.getElementById("date").value
const d = date ? new Date(date) : new Date()

const moon = getMoonPhase(d)
const tide = getTideType(moon)

const data = getAll()
data.push({
  species,
  place,
  length,
  coords,
  photo,
  date,
  moon,
  tide
})

saveAll(data)

alert("Saved")

renderLog()
renderStats()

}

function renderLog(){

const data=getAll()

let html=""

data.forEach((c,i)=>{

list.innerHTML += `
  <div class="card">
    <div class="entryTitle">${title}</div>

    <div class="entryMeta">
      ${place ? place + " • " : ""}${len ? len + " cm • " : ""}${date}
    </div>

    ${c.photo ? `<img src="${c.photo}" style="width:100%;border-radius:12px;margin-top:8px">` : ""}

    <div class="chipRow">
      ${hasCoords ? `<button class="smallBtn" onclick="navigateToCoords('${c.coords}')">📍 Nav</button>` : ""}
      <button class="smallBtn danger" onclick="deleteCatch('${c.id}')">🗑 Delete</button>
    </div>
  </div>
`;
`

})

document.getElementById("logList").innerHTML=html

}

function deleteCatch(i){

const data=getAll()

data.splice(i,1)

saveAll(data)

renderLog()
renderStats()
renderMap()

}

function renderStats(){

const data=getAll()

let species={}

data.forEach(c=>{
species[c.species]=(species[c.species]||0)+1
})

let html="Total catches: "+data.length+"<br><br>"

for(let s in species){
html+=s+" : "+species[s]+"<br>"
}

document.getElementById("statsText").innerHTML=html

}

function renderMap(){

if(!map){

map=L.map("map").setView([-34.37,21.43],10)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
maxZoom:19
}).addTo(map)

}

markers.forEach(m=>map.removeLayer(m))
markers=[]

const data=getAll()

data.forEach(c=>{

if(!c.coords) return

const parts=c.coords.split(",")

const lat=parseFloat(parts[0])
const lng=parseFloat(parts[1])

const m=L.marker([lat,lng]).addTo(map)

m.bindPopup(c.species)

markers.push(m)

})

}

function getGPS(){

if(!navigator.geolocation){
alert("GPS nie beskikbaar")
return
}

navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude
const lng=pos.coords.longitude

document.getElementById("coords").value=lat+","+lng

})

}

function toBase64(file){

return new Promise((resolve,reject)=>{

const reader=new FileReader()

reader.readAsDataURL(file)

reader.onload=()=>resolve(reader.result)

reader.onerror=error=>reject(error)

})

}

</script>

</body>
</html>

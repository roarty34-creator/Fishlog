
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nicoleen 🚤</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b1220;
  color:#e8eefc;
}

header{
  padding:20px;
  font-size:28px;
  font-weight:bold;
}

.container{
  padding:20px;
}

.card{
  background:#101a2e;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

input, select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  background:#1a2740;
  color:white;
}

button{
  padding:10px 15px;
  border-radius:10px;
  border:none;
  background:#4f8cff;
  color:white;
  margin-right:10px;
}

.logItem{
  background:#101a2e;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>Nicoleen 🚤</header>

<div class="container">

<div class="card">
<h3>Add Catch</h3>

<select id="species">
<option value="">Kies spesie...</option>
<option>Kabeljou</option>
<option>Yellowtail</option>
<option>Bonito</option>
<option>Steenbras</option>
</select>

<input id="place" placeholder="Plek">
<input id="length" placeholder="Lengte (cm)">

<button onclick="saveCatch()">Save</button>
</div>

<h3>Log</h3>
<div id="log"></div>

</div>

<script>

function getAll(){
  return JSON.parse(localStorage.getItem("fishlog") || "[]");
}

function saveAll(data){
  localStorage.setItem("fishlog", JSON.stringify(data));
}

function saveCatch(){
  const species = document.getElementById("species").value;
  const place = document.getElementById("place").value;
  const length = document.getElementById("length").value;

  if(!species) return alert("Kies spesie");

  const data = getAll();
  data.push({
    species,
    place,
    length,
    date: new Date().toLocaleDateString()
  });

  saveAll(data);

  document.getElementById("species").value="";
  document.getElementById("place").value="";
  document.getElementById("length").value="";

  loadLog();
}

function loadLog(){
  const log = document.getElementById("log");
  const data = getAll();

  log.innerHTML="";

  data.reverse().forEach(c=>{
    log.innerHTML += `
      <div class="logItem">
        <b>${c.species}</b><br>
        ${c.place || ""}<br>
        ${c.length || ""} cm<br>
        <small>${c.date}</small>
      </div>
    `;
  });
}

loadLog();

</script>

</body>
</html>

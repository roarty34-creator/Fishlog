<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FishLog</title>
<style>
  .topnav{
  display:inline-flex;
  background:#0e1730;
  padding:6px;
  border-radius:999px;
  border:1px solid var(--border);
  gap:6px;
  margin-bottom:20px;
}

.navbtn{
  border:none;
  background:transparent;
  padding:8px 18px;
  border-radius:999px;
  font-weight:700;
  color:var(--text);
}

.navbtn.active{
  background:var(--accent);
  color:#071022;
}
:root{
  --bg:#0b1220;
  --card:#101a2e;
  --text:#e8eefc;
  --muted:#9fb0d0;
  --accent:#4f8cff;
  --border:#20304d;
}

body{
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: radial-gradient(1200px 800px at 20% 0%, #142040 0%, var(--bg) 55%);
  color:var(--text);
  padding:20px;
}

h2{
  margin-top:0;
}

button{
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
  padding: 10px 14px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 700;
  transition: transform .06s ease, background .2s ease, border-color .2s ease;
}

button:hover{
  border-color: var(--accent);
}

button:active{
  transform: scale(0.98);
}




.card{
  background: linear-gradient(180deg, #122042 0%, var(--card) 100%);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px;
  margin: 10px 0;
  box-shadow: 0 10px 25px rgba(0,0,0,.25);
}

input{
  width:100%;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #0e1730;
  color: var(--text);
  margin-bottom:10px;
}
section{
  display:none;
}
  .topnav{
  display:inline-flex;
  background:#0e1730;
  padding:6px;
  border-radius:999px;
  border:1px solid var(--border);
  gap:6px;
  margin-bottom:20px;
}
  label.small{
  display:block;
  margin: 10px 0 6px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}

#add .card{
  max-width: 520px;
}
</style>
</head>
<body>

<h2>FishLog</h2>

<div class="topnav">
  <button class="navbtn" id="btnAdd" onclick="show('add')">Add</button>
  <button class="navbtn" id="btnLog" onclick="show('log')">Log</button>
</div>

<section id="add">
  <div class="card">
    <h3 style="margin:0 0 10px">Add Catch</h3>

    <label class="small">Spesie</label>
    <input id="species" placeholder="bv. Kaapse Kabeljou">

    <label class="small">Plek</label>
    <input id="place" placeholder="bv. Stilbaai / Die Punt">

    <label class="small">Lengte (cm)</label>
    <input id="length" placeholder="bv. 65">

    <button class="navbtn active" style="margin-top:10px" onclick="saveCatch()">Save</button>
  </div>
</section>

<section id="log">
<h3>Catch Log</h3>
<div id="list"></div>
</section>

  <script>
(() => {
  const KEY = "fishlog";

  const el = (id) => document.getElementById(id);
  const species = el("species");
  const place = el("place");
  const length = el("length");
  const list = el("list");

  function getAll() {
    return JSON.parse(localStorage.getItem(KEY) || "[]");
  }

  function saveAll(data) {
    localStorage.setItem(KEY, JSON.stringify(data));
  }

  function saveCatch() {
    const data = getAll();
    data.push({
      id: Date.now(),
      species: species.value.trim(),
      place: place.value.trim(),
      length: length.value.trim(),
      date: new Date().toLocaleDateString()
    });
    saveAll(data);

    species.value = "";
    place.value = "";
    length.value = "";

    show("log");
  }

  function deleteCatch(id) {
    const ok = confirm("Delete hierdie vang?");
    if (!ok) return;

    // as id dalk string/nommer meng, maak seker dit vergelyk reg:
    const data = getAll().filter(c => String(c.id) !== String(id));
    saveAll(data);
    loadLog();
  }

  function loadLog() {
    list.innerHTML = "";
    const data = getAll();

    data.forEach(c => {
      // OU items sonder id? Gee vir hulle een en save terug.
      if (!c.id) c.id = Date.now() + Math.floor(Math.random() * 1000);

      list.innerHTML += `
        <div class="card">
          <b>${c.species || ""}</b><br>
          ${(c.place || "")} • ${(c.length || "")}cm<br>
          <small>${c.date || ""}</small>
          <div style="margin-top:10px">
            <button class="navbtn" onclick="deleteCatch('${c.id}')">Delete</button>
          </div>
        </div>
      `;
    });

    // save terug as ons ids moes byvoeg
    saveAll(data);
  }

  function setActive(id){
    const bAdd = el("btnAdd");
    const bLog = el("btnLog");
    if(!bAdd || !bLog) return;
    bAdd.classList.toggle("active", id === "add");
    bLog.classList.toggle("active", id === "log");
  }

  function show(id) {
    document.querySelectorAll("section").forEach(s => s.style.display = "none");
    el(id).style.display = "block";
    setActive(id);
    if (id === "log") loadLog();
  }

  // Maak funksies beskikbaar vir HTML onclick
  window.show = show;
  window.saveCatch = saveCatch;
  window.deleteCatch = deleteCatch;

  // START
  show("add");
})();
  </script>
  

</body>
</html>

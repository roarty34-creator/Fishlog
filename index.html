<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FishLog</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#0b1320;
color:white;
}

h2{
text-align:center;
margin-top:10px;
}

.topnav{
text-align:center;
margin:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
background:#1f7ae0;
color:white;
}

.card{
background:#162033;
margin:10px;
padding:15px;
border-radius:10px;
}

input,select{
width:100%;
padding:8px;
margin-top:8px;
margin-bottom:8px;
border-radius:6px;
border:none;
}

#map{
height:400px;
border-radius:10px;
}

</style>
</head>

<body>

<h2>FishLog 🎣</h2>

<div class="topnav">
<button onclick="show('add')">Add</button>
<button onclick="show('log')">Log</button>
<button onclick="show('map')">Map</button>
<button onclick="show('stats')">Stats</button>
</div>

<div id="add" class="card">

<h3>Add Catch</h3>

<select id="species">
<option value="">Kies spesie</option>
<option>Kaapse Kabeljou</option>
<option>Geelstert</option>
<option>Bonnie</option>
<option>Snapper</option>
<option>Galjoen</option>
</select>

<input id="place" placeholder="Plek">

<input id="length" placeholder="Lengte cm">

<input id="coords" placeholder="GPS coords">

<button onclick="getGPS()">Get GPS</button>

<button onclick="saveCatch()">Save Catch</button>

</div>

<div id="log" class="card" style="display:none">
<h3>Log</h3>
<div id="logList"></div>
</div>

<div id="map" class="card" style="display:none"></div>

<div id="stats" class="card" style="display:none">
<h3>Stats</h3>
<div id="statsText"></div>
</div>

<script>

let map
let markers=[]

function show(id){

document.getElementById("add").style.display="none"
document.getElementById("log").style.display="none"
document.getElementById("map").style.display="none"
document.getElementById("stats").style.display="none"

document.getElementById(id).style.display="block"

if(id==="log") renderLog()
if(id==="stats") renderStats()
if(id==="map") renderMap()

}

function getAll(){

return JSON.parse(localStorage.getItem("fishlog")||"[]")

}

function saveAll(data){

localStorage.setItem("fishlog",JSON.stringify(data))

}

function saveCatch(){

const species=document.getElementById("species").value
const place=document.getElementById("place").value
const length=document.getElementById("length").value
const coords=document.getElementById("coords").value

if(!species)return alert("Kies spesie")

const data=getAll()

data.push({
species,
place,
length,
coords,
date:new Date().toLocaleDateString()
})

saveAll(data)

alert("Saved")

}

function renderLog(){

const data=getAll()

let html=""

data.forEach(c=>{

html+=`
<div style="border-bottom:1px solid #333;padding:8px">
<b>${c.species}</b><br>
${c.place}<br>
${c.length} cm<br>
${c.date}
</div>
`

})

document.getElementById("logList").innerHTML=html

}

function renderStats(){

const data=getAll()

let total=data.length

let species={}

data.forEach(c=>{
species[c.species]=(species[c.species]||0)+1
})

let html="Total catches: "+total+"<br><br>"

for(let s in species){

html+=s+" : "+species[s]+"<br>"

}

document.getElementById("statsText").innerHTML=html

}

function renderMap(){

if(!map){

map=L.map("map").setView([-34.37,20.85],10)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
maxZoom:19
}).addTo(map)

}

markers.forEach(m=>map.removeLayer(m))
markers=[]

const data=getAll()

data.forEach(c=>{

if(!c.coords)return

const parts=c.coords.split(",")

const lat=parseFloat(parts[0])
const lng=parseFloat(parts[1])

const m=L.marker([lat,lng]).addTo(map)

m.bindPopup(c.species)

markers.push(m)

})

}

function getGPS(){

if(!navigator.geolocation){
alert("GPS nie beskikbaar")
return
}

navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude
const lng=pos.coords.longitude

document.getElementById("coords").value=lat+","+lng

})

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="af">
<head>
<style>
root{--bg:#0b1220;--panel:#111a30;--card:#162040;--line:rgba(255,255,255,.12);--text:#e7eefc;--muted:rgba(231,238,252,.75);--brand:#2c5cff;--danger:#ff3b3b;}
body{margin:0;font-family:Arial,system-ui;background:var(--bg);color:var(--text);}
</style>
</head>
<body>
<header>FishLog</header>

<nav>
  <button id="btnLog" class="active" onclick="showTab('log')">Logboek</button>
  <button id="btnAdd" onclick="showTab('add')">Add Vang</button>
  <button id="btnMap" onclick="showTab('map')">Map</button>
  <button id="btnStats" onclick="showTab('stats')">Stats</button>
</nav>

<main>
  <section id="log" class="active">
  <div class="card">
    <b>Filter</b>
    <div class="row" style="margin-top:10px">
      <select id="tripFilter" onchange="loadLog()"></select>
      <button class="secondary" type="button" onclick="clearTripFilter()">All trips</button>
    </div>
    <div class="small">Kies ’n trip om net daai vangste te sien.</div>
  </div>
  <div id="logList"></div>
  </section>

  <section id="add">
    <label>Spesie</label>
    <select id="species">
      <option>Kabeljou</option><option>Geelstert</option><option>Bonnie</option>
      <option>Rooi roman</option><option>Snapper</option><option>Silver (Bastermeid)</option>
      <option>Rooi steenbras</option><option>Yellowbelly Rockcod</option>
    </select>
    <label>Trip / Folder</label>
<div class="row">
  <select id="tripSelect"></select>
  <button class="secondary" type="button" onclick="newTrip()">New Trip</button>
</div>

    <div class="row">
      <div><label>Lengte (cm)</label><input id="length" inputmode="decimal" placeholder="bv. 78"></div>
      <div><label>Gewig (kg)</label><input id="weight" inputmode="decimal" placeholder="bv. 6.5"></div>
    </div>

    <label>Plek naam</label>
    <input id="place" placeholder="bv. Stilbaai / Goukou mond">

    <label>Foto</label>
    <input id="photo" type="file" accept="image/*" capture="environment">

    <label>Koördinate</label>
    <div class="row">
      <button class="secondary" type="button" onclick="getGPS()">Kry GPS</button>
      <input id="coords" readonly placeholder="lat, lon">
    </div>

    <label>Notas</label>
    <textarea id="notes" placeholder="aas/lure, gety, wind, ens."></textarea>

    <div class="row">
      <button class="primary" type="button" onclick="saveCatch()">Save</button>
      <button class="secondary" type="button" onclick="clearForm()">Clear</button>
    </div>
  </section>

  <section id="map">
    <div class="card">
      <b>Map View</b>
      <div class="small">Pins = jou vangste</div>
      <div id="mapBox" style="margin-top:10px"></div>
    </div>
  </section>

  <section id="stats">
    <div class="card">
      <b>Stats</b>
      <div id="statsBox" class="small" style="margin-top:8px"></div>
    </div>
  </section>
</main>

<script>
  const KEY = "fishlog";

  function safeNum(v){
    if(!v) return null;
    const n = Number(String(v).replace(",", "."));
    return Number.isFinite(n) ? n : null;
  }
function showTab(tab){
  document.querySelectorAll(".tab").forEach(t=>t.style.display="none");
  document.getElementById(tab).style.display="block";

  if(tab === "log"){
    ensureTripsUI();
    loadLog();
  }

  if(tab === "map"){
    initMap();
  }

  if(tab === "stats"){
    renderStats();
  }
}
  function getGPS(){
    if(!navigator.geolocation){ alert("GPS nie ondersteun nie."); return; }
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        const lat = pos.coords.latitude.toFixed(6);
        const lon = pos.coords.longitude.toFixed(6);
        document.getElementById("coords").value = `${lat}, ${lon}`;
      },
      ()=>alert("Kon nie GPS kry nie. Check location permission."),
      { enableHighAccuracy:true, timeout:15000 }
    );
  }

  function fileToDataUrl(file){
    return new Promise((resolve,reject)=>{
      const r = new FileReader();
      r.onload = ()=>resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  async function saveCatch(){
    const species = document.getElementById("species").value;
    const length = safeNum(document.getElementById("length").value.trim());
    const weight = safeNum(document.getElementById("weight").value.trim());
    const place  = document.getElementById("place").value.trim();
    const notes  = document.getElementById("notes").value.trim();
    const coords = document.getElementById("coords").value.trim();
    const photoFile = document.getElementById("photo").files[0];

    if(!coords){ alert("Kry eers GPS koördinate."); return; }
    if(!photoFile){ alert("Neem/kies eers ’n foto."); return; }

    const photo = await fileToDataUrl(photoFile);
    const catches = JSON.parse(localStorage.getItem(KEY) || "[]");
    const trip = (document.getElementById("tripSelect")?.value) || "Geen Trip";
    catches.push({
  id: crypto.randomUUID ? crypto.randomUUID() : (Date.now()+"_"+Math.random()),
  species, length, weight, place, notes, coords, photo, trip,
  date: new Date().toLocaleString()
});
    localStorage.setItem(KEY, JSON.stringify(catches));

    clearForm();
    showTab("log");
    if(window._fishMap) initMap();
  }

  function clearForm(){
    ["length","weight","place","notes","coords","photo"].forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.value = "";
    });
  }
function getTrips(){
  return JSON.parse(localStorage.getItem(KEY+"_trips") || "[]");
}
function setTrips(trips){
  localStorage.setItem(KEY+"_trips", JSON.stringify(trips));
}

function ensureTripsUI(){
  // Ensure at least one default trip exists
let trips = JSON.parse(localStorage.getItem("fishlog_trips") || "[]");
  if(!trips.length){
    trips = ["Stilbaai Trip"];
    localStorage.setItem("fishlog_trips", JSON.stringify(trips));
  }

  // Add screen dropdown
  const tripSelect = document.getElementById("tripSelect");
  if(tripSelect){
    tripSelect.innerHTML = trips.map(t=>`<option>${t}</option>`).join("");
  }

  // Log filter dropdown
  const tripFilter = document.getElementById("tripFilter");
  if(tripFilter){
    const current = tripFilter.value || "ALL";
    tripFilter.innerHTML = `<option value="ALL">All trips</option>` + trips.map(t=>`<option value="${t}">${t}</option>`).join("");
    // keep selection if possible
    if([...tripFilter.options].some(o=>o.value===current)) tripFilter.value = current;
  }
}

function newTrip(){
  const name = prompt("Trip naam? bv. Stilbaai 10 Maart");
  if(!name) return;
  const clean = name.trim();
  if(!clean) return;

  const trips = getTrips();
  if(!trips.includes(clean)) trips.push(clean);
localStorage.setItem("fishlog_trips", JSON.stringify(trips));
  ensureTripsUI();

  const tripSelect = document.getElementById("tripSelect");
  if(tripSelect) tripSelect.value = clean;
}

function clearTripFilter(){
  const tripFilter = document.getElementById("tripFilter");
  if(tripFilter) tripFilter.value = "ALL";
  loadLog();
}
function deleteCatchById(id){
  const catches = JSON.parse(localStorage.getItem(KEY) || "[]");
  const idx = catches.findIndex(c=>c.id===id);
  if(idx === -1) return;
  catches.splice(idx, 1);
  localStorage.setItem(KEY, JSON.stringify(catches));
  loadLog();
  if(window._fishMap) initMap();
  renderStats();
}

  function loadLog(){
  const wrap = document.getElementById("logList") || document.getElementById("log");
  const catches = JSON.parse(localStorage.getItem(KEY) || "[]");

  // Build/refresh filter dropdown
  ensureTripsUI();

  const filter = document.getElementById("tripFilter");
  const selectedTrip = filter ? filter.value : "ALL";

  const filtered = (selectedTrip && selectedTrip !== "ALL")
    ? catches.filter(c => (c.trip || "Geen Trip") === selectedTrip)
    : catches;

  if(!filtered.length){
    wrap.innerHTML = `<div class="card"><b>Nog geen vangste nie.</b><div class="small">Gaan na “Add Vang”.</div></div>`;
    return;
  }

  wrap.innerHTML = "";
  filtered.slice().reverse().forEach((c,i)=>{
    const mapsUrl = "https://www.google.com/maps?q=" + encodeURIComponent(c.coords || "");
    wrap.innerHTML += `
      <div class="card">
        <b>${c.species || "Onbekend"}</b><br>
        <span class="small">${c.date || ""}</span><br>
        <div class="small"><b>Trip:</b> ${(c.trip || "Geen Trip")}</div>
        ${c.place ? (c.place + "<br>") : ""}
        ${c.coords ? (c.coords + "<br>") : ""}
        ${c.coords ? (`<button class="secondary" type="button" onclick="window.open('${mapsUrl}','_blank')" style="margin-top:8px">Open in Google Maps</button>`) : ""}
        ${Number.isFinite(c.length) ? ("<div class='small'>Lengte: <b>"+c.length+" cm</b></div>") : ""}
        ${Number.isFinite(c.weight) ? ("<div class='small'>Gewig: <b>"+c.weight+" kg</b></div>") : ""}
        ${c.photo ? (`<img class="thumb" src="${c.photo}" alt="foto">`) : ""}
        ${c.notes ? ("<div class='small' style='margin-top:8px'>"+c.notes+"</div>") : ""}
        <button class="danger" type="button" onclick="deleteCatchById('${c.id}')" style="margin-top:10px">Delete</button>
      </div>
    `;
  });
  }

    log.innerHTML = "";
    catches.slice().reverse().forEach((c,i)=>{
      const mapsUrl = "https://www.google.com/maps?q=" + encodeURIComponent(c.coords || "");
      log.innerHTML += `
        <div class="card">
          <b>${c.species || "Onbekend"}</b><br>
          <span class="small">${c.date || ""}</span><br>
          ${c.place ? (c.place + "<br>") : ""}
          ${c.coords ? (c.coords + "<br>") : ""}
          ${c.coords ? (`<button class="secondary" type="button" onclick="window.open('${mapsUrl}','_blank')" style="margin-top:8px">Open in Google Maps</button>`) : ""}
          ${Number.isFinite(c.length) ? ("<div class='small'>Lengte: <b>"+c.length+" cm</b></div>") : ""}
          ${Number.isFinite(c.weight) ? ("<div class='small'>Gewig: <b>"+c.weight+" kg</b></div>") : ""}
          ${c.photo ? (`<img class="thumb" src="${c.photo}" alt="foto">`) : ""}
          ${c.notes ? ("<div class='small' style='margin-top:8px'>"+c.notes+"</div>") : ""}
          <button class="danger" type="button" onclick="deleteCatch(${i})" style="margin-top:10px">Delete</button>
        </div>
      `;
    });
  }

  function initMap(){
    if(!window.L){ alert("Map library het nie gelaai nie. Reload."); return; }

    if(!window._fishMap){
      window._fishMap = L.map("mapBox").setView([-34.37, 21.42], 10);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 18 }).addTo(window._fishMap);
      window._fishMarkers = L.layerGroup().addTo(window._fishMap);
    }

  window._fishMarkers.clearLayers();

const all = JSON.parse(localStorage.getItem(KEY) || "[]");
const selectedTrip = document.getElementById("tripFilter")?.value || "ALL";
const catches = (selectedTrip !== "ALL")
  ? all.filter(c => (c.trip || "Geen Trip") === selectedTrip)
  : all;

const points = [];

    catches.forEach(c=>{
      if(!c.coords) return;
      const parts = c.coords.split(",");
      const lat = parseFloat(parts[0]);
      const lon = parseFloat(parts[1]);
      if(!Number.isFinite(lat) || !Number.isFinite(lon)) return;
      points.push([lat,lon]);
      L.marker([lat,lon]).addTo(window._fishMarkers).bindPopup(`<b>${c.species||""}</b><br>${c.date||""}<br>${c.place||""}`);
    });

    if(points.length>=2) window._fishMap.fitBounds(points, {padding:[20,20]});
    else if(points.length===1) window._fishMap.setView(points[0], 13);
  }

  function renderStats(){
    const box = document.getElementById("statsBox");

    
    if(!catches.length){ box.innerHTML = "Nog geen vangste nie."; return; }

    const total = catches.length;
    const counts = {};
    let biggestLen=null, biggestW=null;

    catches.forEach(c=>{
      const s = c.species || "Onbekend";
      counts[s]=(counts[s]||0)+1;
      if(Number.isFinite(c.length) && (!biggestLen || c.length>biggestLen.length)) biggestLen=c;
      if(Number.isFinite(c.weight) && (!biggestW || c.weight>biggestW.weight)) biggestW=c;
    });

    const per = Object.entries(counts).sort((a,b)=>b[1]-a[1])
      .map(([s,n])=>`<div style="margin-top:6px"><b>${s}</b>: ${n}</div>`).join("");

    box.innerHTML = `
      <div><b>Totaal vangste:</b> ${total}</div><br>
      <div><b>Grootste lengte:</b> ${biggestLen ? (biggestLen.species+" — "+biggestLen.length+" cm") : "—"}</div>
      <div><b>Grootste gewig:</b> ${biggestW ? (biggestW.species+" — "+biggestW.weight+" kg") : "—"}</div><br>
      <div><b>Per spesie:</b><br>${per}</div>
    `;
  }
<script>
  // TEST: wys dat JS loop
  document.body.insertAdjacentHTML(
    "afterbegin",
    '<div style="padding:8px;background:#ff3b3b;color:#fff;font-weight:900;text-align:center">JS OK</div>'
  );

  // As hierdie functions bestaan, roep hulle
  document.addEventListener("DOMContentLoaded", function () {
    if (typeof ensureTripsUI === "function") ensureTripsUI();
    if (typeof loadLog === "function") loadLog();
  });
</script>

</body>
</html>

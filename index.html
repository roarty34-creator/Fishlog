<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>FishLog</title>

<style>
:root{
  --bg:#0b1220;
  --card:#101a2e;
  --text:#e8eefc;
  --muted:#9fb0d0;
  --accent:#4f8cff;
  --border:#20304d;
}

body{
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: radial-gradient(1200px 800px at 20% 0%, #142040 0%, var(--bg) 55%);
  color:var(--text);
  padding:20px;
}

h2{ margin-top:0; }

button{
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
  padding: 10px 14px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 700;
}

button:hover{ border-color: var(--accent); }

.topnav{
  display:inline-flex;
  background:#0e1730;
  padding:6px;
  border-radius:999px;
  border:1px solid var(--border);
  gap:6px;
  margin-bottom:20px;
}

.navbtn{
  border:none;
  background:transparent;
  padding:8px 18px;
  border-radius:999px;
  font-weight:700;
  color:var(--text);
}

.navbtn.active{
  background:var(--accent);
  color:#071022;
}

.card{
  background: linear-gradient(180deg, #122042 0%, var(--card) 100%);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px;
  margin: 10px 0;
}

input{
  width:100%;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #0e1730;
  color: var(--text);
  margin-bottom:10px;
}

label.small{
  display:block;
  margin: 10px 0 6px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}

section{ display:none; }
</style>
</head>

<body>

<h2>FishLog</h2>

<div class="topnav">
  <button class="navbtn" id="btnAdd" onclick="show('add')">Add</button>
  <button class="navbtn" id="btnLog" onclick="show('log')">Log</button>
</div>

<section id="add">
  <div class="card">
    <h3>Add Catch</h3>

    <label class="small">Spesie</label>
    <input id="species" autocomplete="off">

    <label class="small">Plek</label>
    <input id="place" autocomplete="off">

    <label class="small">Koördinate</label>
    <div style="display:flex; gap:10px;">
      <button type="button" onclick="getGPS()">Kry GPS</button>
      <input id="coords" readonly autocomplete="off">
    </div>

    <label class="small">Lengte (cm)</label>
    <input id="length" autocomplete="off">

    <button class="navbtn active" style="margin-top:10px" onclick="saveCatch()">Save</button>
  </div>
</section>

<section id="log">
  <h3>Catch Log</h3>
  <button onclick="clearAll()">Clear all</button>
  <div id="list"></div>
</section>

<script>
(() => {

const KEY = "fishlog";

const el = id => document.getElementById(id);
const species = el("species");
const place = el("place");
const coords = el("coords");
const length = el("length");
const list = el("list");

function getAll(){
  return JSON.parse(localStorage.getItem(KEY) || "[]");
}

function saveAll(data){
  localStorage.setItem(KEY, JSON.stringify(data));
}

function show(id){
  document.querySelectorAll("section").forEach(s => s.style.display="none");
  el(id).style.display="block";

  el("btnAdd").classList.toggle("active", id==="add");
  el("btnLog").classList.toggle("active", id==="log");

  if(id==="add"){
    species.value="";
    place.value="";
    coords.value="";
    length.value="";
  }

  if(id==="log") loadLog();
}

function saveCatch(){
  const data=getAll();

  data.push({
    id:Date.now(),
    species:species.value.trim(),
    place:place.value.trim(),
    coords:coords.value.trim(),
    length:length.value.trim(),
    date:new Date().toLocaleDateString()
  });

  saveAll(data);
  show("log");
}

function getGPS(){
  if(!navigator.geolocation){
    alert("GPS nie beskikbaar nie.");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos=>{
      const lat=pos.coords.latitude.toFixed(6);
      const lon=pos.coords.longitude.toFixed(6);
      coords.value=lat+", "+lon;
    },
    ()=>alert("Kon nie ligging kry nie."),
    {enableHighAccuracy:true,timeout:10000}
  );
}

function loadLog(){
  list.innerHTML="";
  const data=getAll();

  if(data.length===0){
    list.innerHTML=`<div class="card">No catches yet.</div>`;
    return;
  }

  data.forEach(c=>{
    list.innerHTML+=`
      <div class="card">
        <b>${c.species}</b><br>
        ${c.place} • ${c.length}cm<br>
        <small>${c.date}</small><br>
        <small>📍 ${c.coords}</small><br><br>
        <button onclick="deleteCatch(${c.id})">Delete</button>
      </div>
    `;
  });
}

function deleteCatch(id){
  const data=getAll().filter(c=>String(c.id)!==String(id));
  saveAll(data);
  loadLog();
}

function clearAll(){
  if(confirm("Delete ALL catches?")){
    saveAll([]);
    loadLog();
  }
}

window.show=show;
window.saveCatch=saveCatch;
window.deleteCatch=deleteCatch;
window.clearAll=clearAll;
window.getGPS=getGPS;

show("add");

})();
</script>

</body>
</html>

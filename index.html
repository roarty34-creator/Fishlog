<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FishLog</title>
<style>
:root{
  --bg:#0b1220;
  --card:#101a2e;
  --text:#e8eefc;
  --muted:#9fb0d0;
  --accent:#4f8cff;
  --border:#20304d;
}

body{
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: radial-gradient(1200px 800px at 20% 0%, #142040 0%, var(--bg) 55%);
  color:var(--text);
  padding:20px;
}

h2{
  margin-top:0;
}

button{
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
  padding: 10px 14px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 700;
  transition: transform .06s ease, background .2s ease, border-color .2s ease;
}

button:hover{
  border-color: var(--accent);
}

button:active{
  transform: scale(0.98);
}




.card{
  background: linear-gradient(180deg, #122042 0%, var(--card) 100%);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px;
  margin: 10px 0;
  box-shadow: 0 10px 25px rgba(0,0,0,.25);
}

input{
  width:100%;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #0e1730;
  color: var(--text);
  margin-bottom:10px;
}
section{
  display:none;
}
  .topnav{
  display:inline-flex;
  background:#0e1730;
  padding:6px;
  border-radius:999px;
  border:1px solid var(--border);
  gap:6px;
  margin-bottom:20px;
}

.navbtn{
  border:none;
  background:transparent;
  padding:8px 18px;
  border-radius:999px;
  font-weight:700;
}

.navbtn.active{
  background:var(--accent);
  color:#071022;
}
</style>
</head>
<body>

<h2>FishLog</h2>

<div class="topnav">
  <button class="navbtn" id="btnAdd" onclick="show('add')">Add</button>
  <button class="navbtn" id="btnLog" onclick="show('log')">Log</button>
</div>

<section id="add">
<h3>Add Catch</h3>
<input id="species" placeholder="Species"><br><br>
<input id="place" placeholder="Place"><br><br>
<input id="length" placeholder="Length (cm)"><br><br>
<button onclick="saveCatch()">Save</button>
</section>

<section id="log">
<h3>Catch Log</h3>
<div id="list"></div>
</section>
  
<script>
(() => {
  const KEY = "fishlog";

  const el = id => document.getElementById(id);
  const species = el("species");
  const place = el("place");
  const length = el("length");
  const list = el("list");

  function getAll(){
    return JSON.parse(localStorage.getItem(KEY) || "[]");
  }

  function saveAll(data){
    localStorage.setItem(KEY, JSON.stringify(data));
  }

  function loadLog(){
    list.innerHTML = "";
    const data = getAll();
    data.forEach(c => {
      list.innerHTML += `
        <div class="card">
          <b>${c.species}</b><br>
          ${c.place} • ${c.length}cm<br>
          <small>${c.date}</small>
        </div>
      `;
    });
  }

  function setActive(id){
    const bAdd = el("btnAdd");
    const bLog = el("btnLog");
    if(!bAdd || !bLog) return;
    bAdd.classList.toggle("active", id === "add");
    bLog.classList.toggle("active", id === "log");
  }

  function show(id){
    document.querySelectorAll("section").forEach(s => s.style.display = "none");
    el(id).style.display = "block";

    setActive(id);
    if(id === "log") loadLog();
  }

  function saveCatch(){
    const data = getAll();
    data.push({
      species: species.value,
      place: place.value,
      length: length.value,
      date: new Date().toLocaleDateString()
    });
    saveAll(data);

    species.value = "";
    place.value = "";
    length.value = "";

    show("log");
  }

  // Maak funksies beskikbaar vir jou buttons
  window.show = show;
  window.saveCatch = saveCatch;

  // START
  show("add");
})();
</script>

</body>
</html>

<html lang="af">
<head>

  <meta name="theme-color" content="#0b1220" />
  <title>FishLog</title>
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    body{font-family:system-ui;margin:0;background:#0b1220;color:#e7eefc}
    header{padding:16px 16px 10px;border-bottom:1px solid rgba(255,255,255,.08)}
    h1{margin:0;font-size:18px}
    .tabs{display:flex;gap:8px;padding:12px 16px}
    .tab{padding:10px 12px;border:1px solid rgba(255,255,255,.12);border-radius:12px;background:#121b33;color:#e7eefc}
    .tab.active{outline:2px solid rgba(120,170,255,.6)}
    main{padding:0 16px 18px}
    .card{background:#121b33;border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px;margin:12px 0}
    label{display:block;margin:10px 0 6px;font-size:13px;opacity:.9}

    button{background:#2c5cff;border:none;font-weight:700}
    button.secondary{background:#223055;border:1px solid rgba(255,255,255,.14)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .listItem{display:flex;gap:12px;align-items:center}
    .thumb{width:56px;height:56px;border-radius:12px;background:#0f1730;border:1px solid rgba(255,255,255,.12);overflow:hidden;display:flex;align-items:center;justify-content:center}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .muted{opacity:.75;font-size:12px}
    .pill{display:inline-block;padding:4px 8px;border-radius:999px;background:rgba(44,92,255,.2);border:1px solid rgba(44,92,255,.35);font-size:12px;margin-left:8px}
  </style>
</head>

<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FishLog</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
--bg:#0b1220;
--card:#162040;
--panel:#111a30;
--text:#e7eefc;
--brand:#2c5cff;
}
body{margin:0;font-family:Arial;background:var(--bg);color:var(--text);}
main{max-width:900px;margin:auto;padding:12px;}
button{padding:10px 14px;border-radius:10px;border:none;background:var(--brand);color:white;font-weight:700;}
button.secondary{background:#2a3555;}
.card{background:var(--card);padding:12px;border-radius:12px;margin-top:12px;}
.panel{background:var(--panel);padding:12px;border-radius:12px;margin-top:12px;}
input,select,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#0f1a33;color:white;}
textarea{min-height:70px;}
section{display:none;}
section.active{display:block;}
#map{height:350px;border-radius:12px;margin-top:10px;}
.row{display:flex;gap:8px;flex-wrap:wrap;}
.small{font-size:13px;opacity:.7;margin-top:6px;}
</style>
</head>

<body>
<main>

<div class="row">
<button onclick="showTab('log')">Log</button>
<button onclick="showTab('add')">Add</button>
<button onclick="showTab('mapTab')">Map</button>
<button onclick="showTab('stats')">Stats</button>
</div>

<section id="log" class="active">
<div class="panel">
<b>Filter</b>
<select id="tripFilter"></select>
</div>
<div id="logList"></div>
</section>

<section id="add">
<div class="card">

<label>Spesie</label>
<select id="species">
<option>Kabeljou</option>
<option>Geelstert</option>
<option>Elf</option>
<option>Steenbras</option>
<option>Ander</option>
</select>

<label>Trip</label>
<input id="trip">

<label>Lengte (cm)</label>
<input id="length">

<label>Gewig (kg)</label>
<input id="weight">

<label>Plek</label>
<input id="place">

<label>Foto</label>
<div class="row">
<button type="button" onclick="document.getElementById('camPick').click()">Camera</button>
<button type="button" class="secondary" onclick="document.getElementById('galPick').click()">Gallery</button>
</div>

<input id="camPick" type="file" accept="image/*" capture="environment" style="display:none">
<input id="galPick" type="file" accept="image/*" style="display:none">

<div id="photoHint" class="small">Geen foto gekies nie.</div>

<label>Notas</label>
<textarea id="notes"></textarea>

<div class="row" style="margin-top:10px;">
<button onclick="saveCatch()">Save</button>
<button class="secondary" onclick="clearForm()">Clear</button>
</div>

</div>
</section>

<section id="mapTab">
<div class="card">
<div id="map"></div>
</div>
</section>

<section id="stats">
<div class="card">
<div id="statsBox"></div>
</div>
</section>

</main>

<script>

let catches = JSON.parse(localStorage.getItem("fishlog")||"[]");
let pickedPhoto=null;

function showTab(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
if(id==="mapTab") initMap();
if(id==="stats") renderStats();
}

document.getElementById("camPick").addEventListener("change",(e)=>{
if(e.target.files[0]){
pickedPhoto=e.target.files[0];
document.getElementById("photoHint").innerText="Gekies: "+pickedPhoto.name;
}
});

document.getElementById("galPick").addEventListener("change",(e)=>{
if(e.target.files[0]){
pickedPhoto=e.target.files[0];
document.getElementById("photoHint").innerText="Gekies: "+pickedPhoto.name;
}
});

async function compressImage(file){
return new Promise(resolve=>{
const reader=new FileReader();
reader.onload=e=>{
const img=new Image();
img.onload=()=>{
const canvas=document.createElement("canvas");
const maxWidth=800;
const scale=Math.min(1,maxWidth/img.width);
canvas.width=img.width*scale;
canvas.height=img.height*scale;
canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
resolve(canvas.toDataURL("image/jpeg",0.7));
};
img.src=e.target.result;
};
reader.readAsDataURL(file);
});
}

async function saveCatch(){
let photoData=null;
if(pickedPhoto) photoData=await compressImage(pickedPhoto);

const newCatch={
species:document.getElementById("species").value,
trip:document.getElementById("trip").value,
length:document.getElementById("length").value,
weight:document.getElementById("weight").value,
place:document.getElementById("place").value,
notes:document.getElementById("notes").value,
photo:photoData,
date:new Date().toLocaleString()
};

catches.push(newCatch);
localStorage.setItem("fishlog",JSON.stringify(catches));
clearForm();
loadLog();
alert("Gestoor!");
}

function clearForm(){
document.getElementById("trip").value="";
document.getElementById("length").value="";
document.getElementById("weight").value="";
document.getElementById("place").value="";
document.getElementById("notes").value="";
document.getElementById("photoHint").innerText="Geen foto gekies nie.";
pickedPhoto=null;
}

function loadLog(){
const list=document.getElementById("logList");
list.innerHTML="";
catches.slice().reverse().forEach(c=>{
list.innerHTML+=`
<div class="card">
<b>${c.species}</b> - ${c.trip}<br>
${c.length?c.length+"cm ":""}${c.weight?c.weight+"kg":""}<br>
${c.place}<br>
${c.photo?'<img src="'+c.photo+'" style="max-width:100%;border-radius:10px;margin-top:8px;">':""}
<div class="small">${c.date}</div>
</div>`;
});
}

function renderStats(){
document.getElementById("statsBox").innerText="Totaal vangste: "+catches.length;
}

let map;
function initMap(){
if(!map){
map=L.map('map').setView([-34.37,21.42],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}
}

loadLog();

</script>

</body>
</html>

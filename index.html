<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>FishLog</title>

<style>
:root{
  --bg:#0b1220;
  --card:#101a2e;
  --text:#e8eefc;
  --muted:#9fb0d0;
  --accent:#4f8cff;
  --border:#20304d;
}

body{
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: radial-gradient(1200px 800px at 20% 0%, #142040 0%, var(--bg) 55%);
  color:var(--text);
  padding:20px;
}

h2{ margin-top:0; }

button{
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
  padding: 10px 14px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 700;
  transition: transform .06s ease, background .2s ease, border-color .2s ease;
}

button:hover{ border-color: var(--accent); }
button:active{ transform: scale(0.98); }

.topnav{
  display:inline-flex;
  background:#0e1730;
  padding:6px;
  border-radius:999px;
  border:1px solid var(--border);
  gap:6px;
  margin-bottom:20px;
}

.navbtn{
  border:none;
  background:transparent;
  padding:8px 18px;
  border-radius:999px;
  font-weight:700;
  color:var(--text);
}

.navbtn.active{
  background:var(--accent);
  color:#071022;
}

.card{
  background: linear-gradient(180deg, #122042 0%, var(--card) 100%);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px;
  margin: 10px 0;
  box-shadow: 0 10px 25px rgba(0,0,0,.25);
}

input{
  width:100%;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #0e1730;
  color: var(--text);
  margin-bottom:10px;
}

label.small{
  display:block;
  margin: 10px 0 6px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}

#add .card{ max-width: 520px; }

section{ display:none; }
</style>
</head>

<body>
<h2>FishLog</h2>

<div class="topnav">
  <button class="navbtn" id="btnAdd" onclick="show('add')">Add</button>
  <button class="navbtn" id="btnLog" onclick="show('log')">Log</button>
</div>

<section id="add">
  <div class="card">
    <h3 style="margin:0 0 10px">Add Catch</h3>

    <label class="small">Spesie</label>
    <input id="species" placeholder="bv. Kaapse Kabeljou" />

    <label class="small">Plek</label>
    <input id="place" placeholder="bv. Stilbaai / Die Punt" />

    <label class="small">Lengte (cm)</label>
    <input id="length" placeholder="bv. 65" />

    <button class="navbtn active" style="margin-top:10px" onclick="saveCatch()">Save</button>
  </div>
</section>

<section id="log">
  <h3>Catch Log</h3>

  <div style="display:flex; gap:10px; margin-bottom:12px;">
    <button onclick="clearAll()">Clear all</button>
  </div>

  <div id="list"></div>
</section>

<script>
(() => {
  const KEY = "fishlog";

  const el = (id) => document.getElementById(id);
  const species = el("species");
  const place = el("place");
  const length = el("length");
  const list = el("list");

  function getAll() {
    return JSON.parse(localStorage.getItem(KEY) || "[]");
  }

  function saveAll(data) {
    localStorage.setItem(KEY, JSON.stringify(data));
  }

  function setActive(id){
    const bAdd = el("btnAdd");
    const bLog = el("btnLog");
    if(!bAdd || !bLog) return;
    bAdd.classList.toggle("active", id === "add");
    bLog.classList.toggle("active", id === "log");
  }

  function show(id) {
    document.querySelectorAll("section").forEach(s => s.style.display = "none");
    el(id).style.display = "block";
    setActive(id);
    if (id === "log") loadLog();
  }

  function saveCatch() {
    const data = getAll();
    data.push({
      id: Date.now(),
      species: species.value.trim(),
      place: place.value.trim(),
      length: length.value.trim(),
      date: new Date().toLocaleDateString()
    });
    saveAll(data);

    species.value = "";
    place.value = "";
    length.value = "";

    show("log");
  }

  function loadLog(){
    list.innerHTML = "";
    const data = getAll();

    if(data.length === 0){
      list.innerHTML = `<div class="card"><small>No catches yet.</small></div>`;
      return;
    }

    data.forEach(c => {
      const safeSpecies = (c.species || "").replaceAll("<","&lt;").replaceAll(">","&gt;");
      const safePlace   = (c.place || "").replaceAll("<","&lt;").replaceAll(">","&gt;");
      const safeLen     = (c.length || "").replaceAll("<","&lt;").replaceAll(">","&gt;");
      const safeDate    = (c.date || "").replaceAll("<","&lt;").replaceAll(">","&gt;");

      list.innerHTML += `
        <div class="card">
          <b>${safeSpecies}</b><br>
          ${safePlace} • ${safeLen}cm<br>
          <small>${safeDate}</small><br><br>

          <button onclick="editCatch(${c.id})">Edit</button>
          <button onclick="deleteCatch(${c.id})">Delete</button>
        </div>
      `;
    });
  }

  function deleteCatch(id) {
    const ok = confirm("Delete hierdie vang?");
    if (!ok) return;

    const data = getAll().filter(c => String(c.id) !== String(id));
    saveAll(data);
    loadLog();
  }

  function editCatch(id){
    const data = getAll();
    const idx = data.findIndex(c => String(c.id) === String(id));
    if(idx === -1) return;

    const c = data[idx];

    const newSpecies = prompt("Species:", c.species || "");
    if (newSpecies === null) return;

    const newPlace = prompt("Place:", c.place || "");
    if (newPlace === null) return;

    const newLength = prompt("Length (cm):", c.length || "");
    if (newLength === null) return;

    c.species = newSpecies.trim();
    c.place = newPlace.trim();
    c.length = newLength.trim();

    saveAll(data);
    loadLog();
  }

  function clearAll(){
    const ok = confirm("Are you sure you want to delete ALL catches?");
    if(!ok) return;
    saveAll([]);
    loadLog();
  }

  // maak beskikbaar vir HTML onclick=""
  window.show = show;
  window.saveCatch = saveCatch;
  window.loadLog = loadLog;
  window.deleteCatch = deleteCatch;
  window.editCatch = editCatch;
  window.clearAll = clearAll;

  // START
  show("add");
})();
</script>

</body>
</html>

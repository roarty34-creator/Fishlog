<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FishLog</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b1220;
color:#e8eefc;
padding:18px;
}

.card{
background:#101a2e;
border-radius:16px;
padding:14px;
margin:10px 0;
}

button{
padding:10px 14px;
border-radius:999px;
border:1px solid #20304d;
background:#0e1730;
color:white;
cursor:pointer;
}

input,select{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid #20304d;
background:#0e1730;
color:white;
margin-bottom:10px;
}

#map{
height:350px;
border-radius:16px;
margin-top:10px;
}

img{
width:100%;
border-radius:12px;
margin-top:8px;
}
</style>
</head>

<body>

<h2>FishLog 🎣</h2>

<div>
<button onclick="show('add')">Add</button>
<button onclick="show('log')">Log</button>
<button onclick="show('map')">Map</button>
<button onclick="show('stats')">Stats</button>
</div>

<!-- ADD -->
<section id="add">

<div class="card">

<label>Spesie</label>
<select id="species">
<option value="">Kies spesie...</option>
<option>Kaapse Kabeljou</option>
<option>Geelstert</option>
<option>Bonnie</option>
<option>Rooi Roman</option>
<option>Snapper</option>
<option>Galjoen</option>
<option>Hottentot</option>
</select>

<label>Plek</label>
<input id="place">

<label>Koördinate</label>
<input id="coords" readonly>

<button onclick="getGPS()">📍 Kry GPS</button>
<button onclick="gpsAndSave()">📍 GPS + Save</button>

<label>Lengte (cm)</label>
<input id="length">

<label>Foto</label>
<input id="photo" type="file" accept="image/*">

<button onclick="saveCatch()">Save</button>

</div>

</section>

<!-- LOG -->
<section id="log">

<div class="card">
<button onclick="resetLog()">Reset All Data</button>
</div>

<div id="list"></div>

</section>

<!-- MAP -->
<section id="mapSection">

<div id="map"></div>

</section>

<!-- STATS -->
<section id="stats">

  <div class="card">
    <h3>Stats</h3>
    <div id="statsBox"></div>
  </div>

  <div class="card">
    <h3>Top Spots (Top 5)</h3>
    <div id="spotsBox"></div>
  </div>

  <div class="card">
    <h3>Vangs per Maand</h3>
    <canvas id="monthChart" width="320" height="180" style="width:100%;background:#0e1730;border-radius:12px;"></canvas>
  </div>

</section>

<script>

const KEY="fishlog"

function getAll(){
return JSON.parse(localStorage.getItem(KEY)||"[]")
}

function saveAll(d){
localStorage.setItem(KEY,JSON.stringify(d))
}

function show(id){

document.querySelectorAll("section").forEach(s=>s.style.display="none")

if(id==="map"){
document.getElementById("mapSection").style.display="block"
initMap()
renderMap()
}else{
document.getElementById(id).style.display="block"
}

if(id==="log") loadLog()
if(id==="stats") renderStats()

}

function getGPS(){

navigator.geolocation.getCurrentPosition(pos=>{

coords.value=pos.coords.latitude.toFixed(6)+","+pos.coords.longitude.toFixed(6)

})

}

function gpsAndSave(){

navigator.geolocation.getCurrentPosition(pos=>{

coords.value=pos.coords.latitude.toFixed(6)+","+pos.coords.longitude.toFixed(6)

saveCatch()

})

}

function saveCatch(){

const file=document.getElementById("photo").files[0]

const reader=new FileReader()

reader.onload=function(){

const data=getAll()

data.push({

id:Date.now(),

species:species.value,

place:place.value,

coords:coords.value,

length:length.value,

photo:reader.result,

date:new Date().toISOString().slice(0,10)

})

saveAll(data)

species.value=""
place.value=""
coords.value=""
length.value=""
document.getElementById("photo").value=""

show("log")

}

if(file) reader.readAsDataURL(file)
else reader.onload()

}

function loadLog(){

list.innerHTML=""

const data=getAll().reverse()

data.forEach(c=>{

list.innerHTML+=`

<div class="card">

<b>${c.species}</b><br>
${c.place} • ${c.length}cm<br>
${c.date}

${c.photo?`<img src="${c.photo}">`:""}

<br>

<button onclick="openMap('${c.coords}')">Maps</button>
<button onclick="directions('${c.coords}')">Directions</button>

<button onclick="deleteCatch(${c.id})">Delete</button>
${extraInfoHtml(c)}

</div>

`

})

}

function deleteCatch(id){

const data=getAll().filter(c=>c.id!==id)

saveAll(data)

loadLog()

}

function resetLog(){

if(confirm("Delete alles?")){

localStorage.clear()

loadLog()

}

}

function openMap(c){

window.open("https://maps.google.com/?q="+c)

}

function directions(c){

window.open("https://www.google.com/maps/dir/?api=1&destination="+c)

}

function renderStats(){
  const data = getAll();

  // Basiese counts
  let kabeljou=0, geelstert=0;
  data.forEach(c=>{
    if(c.species==="Kaapse Kabeljou") kabeljou++;
    if(c.species==="Geelstert") geelstert++;
  });

  // Top spots
  const spotCount = {};
  data.forEach(c=>{
    const p = (c.place || "").trim();
    if(!p) return;
    spotCount[p] = (spotCount[p]||0) + 1;
  });
  const topSpots = Object.entries(spotCount)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5);

  // Per month counts
  const monthCount = {};
  data.forEach(c=>{
    const d = (c.date || "").slice(0,7); // YYYY-MM
    if(!d) return;
    monthCount[d] = (monthCount[d]||0) + 1;
  });
  const months = Object.keys(monthCount).sort(); // old->new

  // Output boxes
  statsBox.innerHTML = `
    Kabeljou: ${kabeljou}<br>
    Geelstert: ${geelstert}<br>
    Total: ${data.length}
  `;

  const spotsBox = document.getElementById("spotsBox");
  if(!topSpots.length){
    spotsBox.innerHTML = "Geen plek data nog nie.";
  } else {
    spotsBox.innerHTML = topSpots.map(([p,n],i)=>`${i+1}. ${p} — ${n}`).join("<br>");
  }

  drawMonthChart(months.map(m=>({m, n: monthCount[m]})));
}

// Simple bar chart (canvas)
function drawMonthChart(rows){
  const canvas = document.getElementById("monthChart");
  if(!canvas) return;
  const ctx = canvas.getContext("2d");

  // clear
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!rows.length){
    ctx.fillText("Geen data nog nie.", 10, 20);
    return;
  }

  const max = Math.max(...rows.map(r=>r.n), 1);
  const pad = 18;
  const w = canvas.width, h = canvas.height;
  const barW = Math.max(10, (w - pad*2) / rows.length - 6);

  rows.forEach((r, i)=>{
    const x = pad + i*(barW+6);
    const barH = Math.round((r.n / max) * (h - pad*2 - 18));
    const y = h - pad - barH;

    // bar (default canvas color)
    ctx.fillRect(x, y, barW, barH);

    // labels
    ctx.font = "10px system-ui";
    ctx.fillText(String(r.n), x, y - 4);
    ctx.fillText(r.m.slice(5), x, h - 6); // MM
  });
}

// Moon phase (0=new, 0.5=full)
function moonPhaseFraction(isoDate){
  // Simple approximation (good enough for logbook)
  const d = new Date(isoDate || new Date().toISOString().slice(0,10));
  const knownNewMoon = new Date("2000-01-06T18:14:00Z").getTime();
  const synodic = 29.530588853 * 24*60*60*1000;
  const phase = ((d.getTime() - knownNewMoon) % synodic) / synodic;
  return (phase + 1) % 1;
}
function moonLabel(frac){
  if(frac < 0.06 || frac > 0.94) return "🌑 New";
  if(frac < 0.25) return "🌒 Waxing";
  if(frac < 0.31) return "🌓 First Q";
  if(frac < 0.50) return "🌔 Waxing";
  if(frac < 0.56) return "🌕 Full";
  if(frac < 0.75) return "🌖 Waning";
  if(frac < 0.81) return "🌗 Last Q";
  return "🌘 Waning";
}

// Distance (km) between 2 coords
function haversineKm(lat1, lon1, lat2, lon2){
  const R = 6371;
  const toRad = (x)=>x*Math.PI/180;
  const dLat = toRad(lat2-lat1);
  const dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

// Add this inside your loadLog() card (optional)
// Show moon + distance if coords exists
function extraInfoHtml(c){
  const hasCoords = c.coords && String(c.coords).includes(",");
  let html = "";

  // moon
  const frac = moonPhaseFraction(c.date);
  html += `<br><small>${moonLabel(frac)}</small>`;

  // distance (asks GPS live)
  if(hasCoords){
    html += `<br><button onclick="distanceTo('${c.coords}')">📏 Distance</button>`;
  }
  return html;
}

function distanceTo(coordStr){
  if(!navigator.geolocation){
    alert("GPS nie beskikbaar nie.");
    return;
  }
  const parts = String(coordStr).split(",");
  const lat2 = parseFloat(parts[0]);
  const lon2 = parseFloat(parts[1]);

  navigator.geolocation.getCurrentPosition(pos=>{
    const lat1 = pos.coords.latitude;
    const lon1 = pos.coords.longitude;
    const km = haversineKm(lat1, lon1, lat2, lon2);
    alert("Afstand na spot: " + km.toFixed(2) + " km");
  }, ()=>alert("Kon nie jou ligging kry nie."));
                                         }

function renderMap(){

if(!map) return

const data=getAll()

const pts=[]

data.forEach(c=>{

if(!c.coords) return

const p=c.coords.split(",")

const lat=parseFloat(p[0])
const lng=parseFloat(p[1])

L.marker([lat,lng]).addTo(map)

pts.push([lat,lng,0.5])

})

if(heat) map.removeLayer(heat)

heat=L.heatLayer(pts).addTo(map)

}

show("add")

</script>

</body>
</html>


<!DOCTYPE html>
<html lang="af">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FishLog</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#0b1320;
color:white;
}

h2{
text-align:center;
margin-top:10px;
}

.topnav{
text-align:center;
margin:10px;
}

button{
padding:10px 14px;
margin:5px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
}

.card{
background:#111827;
margin:10px;
padding:15px;
border-radius:12px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #333;
background:#1f2937;
color:white;
}

#map{
height:350px;
border-radius:12px;
}

img{
width:100%;
border-radius:10px;
margin-top:10px;
}

</style>

</head>

<body>

<h2>FishLog 🎣</h2>

<div class="topnav">

<button onclick="show('add')">Add</button>
<button onclick="show('log')">Log</button>
<button onclick="show('map')">Map</button>
<button onclick="show('stats')">Stats</button>

</div>

<div id="add" class="card">

<h3>Add Catch</h3>

<select id="species">
<option value="">Kies spesie</option>
<option>Kaapse Kabeljou</option>
<option>Geelstert</option>
<option>Bonnie</option>
<option>Snapper</option>
<option>Galjoen</option>
</select>

<input id="place" placeholder="Plek">

<input id="length" placeholder="Lengte cm">

<input id="coords" placeholder="GPS coords">

<button onclick="getGPS()">📍 Use my location</button>

<input id="photo" type="file">

<button onclick="saveCatch()">Save Catch</button>

</div>

<div id="log" class="card" style="display:none">

<h3>Catch Log</h3>

<div id="list"></div>

</div>

<div id="mapSection" class="card" style="display:none">

<h3>Catch Map</h3>

<div id="map"></div>

</div>

<div id="stats" class="card" style="display:none">

<h3>Stats</h3>

<div id="statsBox"></div>

</div>

<script>

let map
let markers=[]

function show(tab){

document.getElementById("add").style.display="none"
document.getElementById("log").style.display="none"
document.getElementById("mapSection").style.display="none"
document.getElementById("stats").style.display="none"

if(tab==="add") document.getElementById("add").style.display="block"
if(tab==="log"){
document.getElementById("log").style.display="block"
renderLog()
}

if(tab==="map"){
document.getElementById("mapSection").style.display="block"
renderMap()

setTimeout(()=>{
if(map) map.invalidateSize()
},200)
}

if(tab==="stats"){
document.getElementById("stats").style.display="block"
renderStats()
}

}

function getAll(){
return JSON.parse(localStorage.getItem("fishlog")||"[]")
}

function saveAll(data){
localStorage.setItem("fishlog",JSON.stringify(data))
}

function saveCatch(){

const species=document.getElementById("species").value
const place=document.getElementById("place").value
const length=document.getElementById("length").value
const coords=document.getElementById("coords").value
const photoInput=document.getElementById("photo")

let photo=""

if(photoInput.files[0]){

const reader=new FileReader()

reader.onload=function(){
photo=reader.result
finish()
}

reader.readAsDataURL(photoInput.files[0])

}else{
finish()
}

function finish(){

const data=getAll()

data.push({
species,
place,
length,
coords,
photo,
date:new Date().toISOString().slice(0,10)
})

saveAll(data)

alert("Catch saved")

}

}

function renderLog(){

const list=document.getElementById("list")
list.innerHTML=""

const data=getAll().reverse()

data.forEach(c=>{

list.innerHTML+=`

<div class="card">

<b>${c.species}</b><br>

${c.place} • ${c.length}cm<br>

${c.date}

${c.photo?`<img src="${c.photo}">`:""}

</div>

`

})

}

function renderMap(){

if(!map){

map=L.map("map").setView([-34.37,20.85],10)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
maxZoom:19
}).addTo(map)

}

markers.forEach(m=>map.removeLayer(m))
markers=[]

const data=getAll()

data.forEach(c=>{

if(!c.coords)return

const parts=c.coords.split(",")

const lat=parseFloat(parts[0])
const lng=parseFloat(parts[1])

if(isNaN(lat)||isNaN(lng))return

const marker=L.marker([lat,lng]).addTo(map)

marker.bindPopup(c.species+"<br>"+c.place)

markers.push(marker)

})

}

function renderStats(){

const data=getAll()

let total=data.length
let speciesCount={}

data.forEach(c=>{
speciesCount[c.species]=(speciesCount[c.species]||0)+1
})

let html="Total catches: "+total+"<br><br>"

for(let s in speciesCount){
html+=s+": "+speciesCount[s]+"<br>"
}

document.getElementById("statsBox").innerHTML=html

}

if(!navigator.geolocation){
alert("GPS nie beskikbaar")
return
}

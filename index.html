<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FishLog</title>
<style>
body { font-family: Arial; padding:20px; }
section { display:none; }
.card { border:1px solid #ccc; padding:10px; margin:10px 0; }
button { margin:5px; }
</style>
</head>
<body>

<h2>FishLog</h2>

<button onclick="show('add')">Add</button>
<button onclick="show('log')">Log</button>

<section id="add">
<h3>Add Catch</h3>
<input id="species" placeholder="Species"><br><br>
<input id="place" placeholder="Place"><br><br>
<input id="length" placeholder="Length (cm)"><br><br>
<button onclick="saveCatch()">Save</button>
</section>

<section id="log">
<h3>Catch Log</h3>
<div id="list"></div>
</section>

<script>
(() => {

const KEY = "fishlog";

const el = id => document.getElementById(id);
const species = el("species");
const place = el("place");
const length = el("length");
const list = el("list");

function getAll(){
  return JSON.parse(localStorage.getItem(KEY) || "[]");
}

function saveAll(data){
  localStorage.setItem(KEY, JSON.stringify(data));
}

function saveCatch(){
  const data = getAll();
  data.push({
    species: species.value,
    place: place.value,
    length: length.value,
    date: new Date().toLocaleDateString()
  });
  saveAll(data);
  species.value="";
  place.value="";
  length.value="";
  show("log");
}

function loadLog(){
  list.innerHTML="";
  const data = getAll();
  data.forEach(c=>{
    list.innerHTML += `
      <div class="card">
        <b>${c.species}</b><br>
        ${c.place} • ${c.length}cm<br>
        <small>${c.date}</small>
      </div>
    `;
  });
}

function show(id){
  document.querySelectorAll("section").forEach(s=>s.style.display="none");
  el(id).style.display="block";
  if(id==="log") loadLog();
}

window.show = show;
window.saveCatch = saveCatch;

show("add");

})();
</script>

</body>
</html>

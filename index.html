<!DOCTYPE html>
<html lang="af">
<head>
  <link rel="manifest" href="manifest.webmanifest">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FishLog</title>
  <meta name="theme-color" content="#0b1220" />

  <!-- Map (Leaflet) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root{
      --bg:#0b1220; --panel:#111a30; --card:#162040;
      --line:rgba(255,255,255,.12); --text:#e7eefc; --muted:rgba(231,238,252,.75);
      --brand:#2c5cff; --danger:#ff3b3b;
      --r:12px;
    }
    body{margin:0;font-family:Arial,system-ui;background:var(--bg);color:var(--text)}
    header{padding:15px;text-align:center;background:var(--card);font-weight:900}
    nav{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;background:var(--panel);padding:10px;border-bottom:1px solid var(--line)}
    nav button{
      padding:10px 12px;border-radius:999px;border:1px solid var(--line);
      background:var(--card);color:#fff;font-weight:900
    }
    nav button.active{outline:2px solid rgba(44,92,255,.75)}
    main{max-width:720px;margin:0 auto}
    section{padding:15px;display:none}
    section.active{display:block}
    .card{background:var(--card);padding:12px;border-radius:var(--r);margin-top:10px;border:1px solid var(--line)}
    label{display:block;margin:10px 0 6px;color:var(--muted);font-size:13px}
    input,select,textarea,button{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);background:#0f1730;color:var(--text)}
    textarea{min-height:90px}
    button.primary{background:var(--brand);border:none;font-weight:900}
    button.secondary{background:#23345c;font-weight:900}
    button.danger{background:var(--danger);border:none;font-weight:900}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .thumb{width:100%;border-radius:10px;margin-top:8px;border:1px solid var(--line)}
    .small{font-size:12px;color:var(--muted);margin-top:8px}
    #mapBox{height:420px;border-radius:12px;border:1px solid var(--line);overflow:hidden}
  </style>
</head>

<body>
<header>FishLog</header>

<nav>
  <button id="btnLog" class="active" onclick="show('log')">Logboek</button>
  <button id="btnAdd" onclick="show('add')">Add Vang</button>
  <button id="btnMap" onclick="show('map')">Map</button>
  <button id="btnStats" onclick="show('stats')">Stats</button>
</nav>

<main>
  <section id="log" class="active"></section>

  <section id="add">
    <label>Spesie</label>
    <select id="species">
      <option>Kabeljou</option>
      <option>Geelstert</option>
      <option>Bonnie</option>
      <option>Rooi roman</option>
      <option>Snapper</option>
      <option>Silver (Bastermeid)</option>
      <option>Rooi steenbras</option>
      <option>Yellowbelly Rockcod</option>
    </select>

    <div class="row">
      <div>
        <label>Lengte (cm) – opsioneel</label>
        <input id="length" inputmode="decimal" placeholder="bv. 78" />
      </div>
      <div>
        <label>Gewig (kg) – opsioneel</label>
        <input id="weight" inputmode="decimal" placeholder="bv. 6.5" />
      </div>
    </div>

    <label>Plek naam (opsioneel)</label>
    <input id="place" placeholder="bv. Stilbaai / Goukou mond" />

    <label>Foto</label>
    <input id="photo" type="file" accept="image/*" capture="environment" />

    <label>Koördinate</label>
    <div class="row">
      <button class="secondary" type="button" onclick="getGPS()">Kry GPS</button>
      <input id="coords" readonly placeholder="lat, lon" />
    </div>

    <label>Notas</label>
    <textarea id="notes" placeholder="aas/lure, gety, wind, ens."></textarea>

    <div class="row">
      <button class="primary" type="button" onclick="saveCatch()">Save</button>
      <button class="secondary" type="button" onclick="clearForm()">Clear</button>
    </div>

    <div class="small">Tip: As GPS nie vra nie, gee Location permission vir die site.</div>
  </section>

  <section id="map">
    <div class="card">
      <b>Map View</b>
      <div class="small">Pins = jou vangste</div>
      <div id="mapBox" style="margin-top:10px"></div>
      <div class="small">As jy nie kaart sien nie, maak seker jou data/internet is aan (tiles laai online).</div>
    </div>
  </section>
</main>

<script>
  const KEY = "fishlog";

  function show(id){
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    document.getElementById("btnLog").classList.toggle("active", id==="log");
    document.getElementById("btnAdd").classList.toggle("active", id==="add");
    document.getElementById("btnMap").classList.toggle("active", id==="map");

    if(id==="log") loadLog();
    if(id==="map"){
      initMap();
      setTimeout(()=>{ if(window._fishMap) window._fishMap.invalidateSize(true); }, 300);
    }
  }

  function safeNum(v){
    if(!v) return null;
    const n = Number(String(v).replace(",", "."));
    return Number.isFinite(n) ? n : null;
  }

  function getGPS(){
    if(!navigator.geolocation){
      alert("GPS nie ondersteun op hierdie browser nie.");
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        const lat = pos.coords.latitude.toFixed(6);
        const lon = pos.coords.longitude.toFixed(6);
        document.getElementById("coords").value = `${lat}, ${lon}`;
      },
      ()=>{
        alert("Kon nie GPS kry nie. Check Location permission vir die site.");
      },
      { enableHighAccuracy:true, timeout:15000 }
    );
  }

  function fileToDataUrl(file){
    return new Promise((resolve,reject)=>{
      const r = new FileReader();
      r.onload = ()=>resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  async function saveCatch(){
    const species = document.getElementById("species").value;
    const length = safeNum(document.getElementById("length").value.trim());
    const weight = safeNum(document.getElementById("weight").value.trim());
    const place  = document.getElementById("place").value.trim();
    const notes  = document.getElementById("notes").value.trim();
    const coords = document.getElementById("coords").value.trim();
    const photoFile = document.getElementById("photo").files[0];

    if(!coords){ alert("Kry eers GPS koördinate."); return; }
    if(!photoFile){ alert("Neem/kies eers ’n foto."); return; }

    const photo = await fileToDataUrl(photoFile);

    const catches = JSON.parse(localStorage.getItem(KEY) || "[]");
    catches.push({
      species, length, weight, place, notes, coords, photo,
      date: new Date().toLocaleString()
    });
    localStorage.setItem(KEY, JSON.stringify(catches));

    clearForm();
    show("log");

    if(window._fishMap){ initMap(); }
  }

  function clearForm(){
    document.getElementById("length").value = "";
    document.getElementById("weight").value = "";
    document.getElementById("place").value = "";
    document.getElementById("notes").value = "";
    document.getElementById("coords").value = "";
    document.getElementById("photo").value = "";
  }

  function deleteCatch(indexFromNewest){
    const catches = JSON.parse(localStorage.getItem(KEY) || "[]");
    const realIndex = catches.length - 1 - indexFromNewest;
    if(realIndex < 0) return;
    catches.splice(realIndex, 1);
    localStorage.setItem(KEY, JSON.stringify(catches));
    loadLog();
    if(window._fishMap){ initMap(); }
  }

  function loadLog(){
    const log = document.getElementById("log");
    const catches = JSON.parse(localStorage.getItem(KEY) || "[]");
function renderStats(){
  const box = document.getElementById("statsBox");
  const catches = JSON.parse(localStorage.getItem(KEY) || "[]");
  if(!box) return;

  if(!catches.length){
    box.innerHTML = "Nog geen vangste nie.";
    return;
  }

  const total = catches.length;

  const bySpecies = {};
  const byPlace = {};
  let biggestLen = null;
  let biggestW = null;

  catches.forEach(c=>{
    const s = c.species || "Onbekend";
    bySpecies[s] = bySpecies[s] || {count:0, lenSum:0, lenN:0, wSum:0, wN:0, maxLen:null, maxW:null};
    bySpecies[s].count++;

    if(Number.isFinite(c.length)){
      bySpecies[s].lenSum += c.length; bySpecies[s].lenN++;
      if(!bySpecies[s].maxLen || c.length > bySpecies[s].maxLen.length) bySpecies[s].maxLen = c;
      if(!biggestLen || c.length > biggestLen.length) biggestLen = c;
    }
    if(Number.isFinite(c.weight)){
      bySpecies[s].wSum += c.weight; bySpecies[s].wN++;
      if(!bySpecies[s].maxW || c.weight > bySpecies[s].maxW.weight) bySpecies[s].maxW = c;
      if(!biggestW || c.weight > biggestW.weight) biggestW = c;
    }

    const p = (c.place && c.place.trim()) ? c.place.trim() : "";
    if(p) byPlace[p] = (byPlace[p] || 0) + 1;
  });

  const fmt1 = (n)=> (Math.round(n * 10) / 10).toString();

  const speciesRows = Object.entries(bySpecies)
    .sort((a,b)=>b[1].count - a[1].count)
    .map(([name, st])=>{
      const avgLen = st.lenN ? fmt1(st.lenSum / st.lenN) + " cm" : "—";
      const avgW   = st.wN ? fmt1(st.wSum / st.wN) + " kg" : "—";
      const bestLen = st.maxLen ? (st.maxLen.length + " cm") : "—";
      const bestW   = st.maxW ? (st.maxW.weight + " kg") : "—";
      return `
        <div class="card" style="margin-top:10px">
          <b>${name}</b><br>
          <span class="small">Vangste: <b>${st.count}</b></span><br>
          <span class="small">Gem. lengte: <b>${avgLen}</b> | Beste: <b>${bestLen}</b></span><br>
          <span class="small">Gem. gewig: <b>${avgW}</b> | Beste: <b>${bestW}</b></span>
        </div>
      `;
    }).join("");

  const spots = Object.entries(byPlace)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5)
    .map(([p,n])=>`<div style="margin-top:6px"><b>${p}</b>: ${n}</div>`)
    .join("");

  const last5 = catches.slice().reverse().slice(0,5)
    .map(c=>`<div style="margin-top:6px"><b>${c.species || "Onbekend"}</b> — ${c.date || ""}${c.place ? (" • " + c.place) : ""}</div>`)
    .join("");

  box.innerHTML = `
    <div class="card" style="margin-top:10px"><b>Totaal vangste:</b> ${total}</div>

    <div class="card" style="margin-top:10px">
      <b>Rekords</b><br>
      <div class="small"><b>Grootste lengte:</b> ${biggestLen ? (biggestLen.species + " — " + biggestLen.length + " cm") : "Geen lengte data"}</div>
      <div class="small"><b>Grootste gewig:</b> ${biggestW ? (biggestW.species + " — " + biggestW.weight + " kg") : "Geen gewig data"}</div>
    </div>

    <div class="card" style="margin-top:10px">
      <b>Top spots</b>
      <div class="small">${spots || "Nog geen plek name nie."}</div>
    </div>

    <div class="card" style="margin-top:10px">
      <b>Laaste 5 vangste</b>
      <div class="small">${last5}</div>
    </div>

    <div class="small" style="margin-top:12px"><b>Per spesie</b> (counts + gemiddeldes)</div>
    ${speciesRows}
  `;
}
    if(!catches.length){
      log.innerHTML = `<div class="card"><b>Nog geen vangste nie.</b><div class="small">Gaan na “Add Vang”.</div></div>`;
      return;
    }

    log.innerHTML = "";
    catches.slice().reverse().forEach((c, i) => {
      const mapsUrl = c.coords ? ("https://www.google.com/maps?q=" + encodeURIComponent(c.coords)) : "";
      log.innerHTML += `
        <div class="card">
          <b>${c.species || "Onbekend"}</b><br>
          <span class="small">${c.date || ""}</span><br>
          ${c.place ? (c.place + "<br>") : ""}
          ${c.coords ? (c.coords + "<br>") : ""}
          ${c.coords ? (`<button class="secondary" type="button" onclick="window.open('${mapsUrl}','_blank')" style="margin-top:8px">Open in Google Maps</button>`) : ""}
          ${Number.isFinite(c.length) ? ("<div class='small'>Lengte: <b>" + c.length + " cm</b></div>") : ""}
          ${Number.isFinite(c.weight) ? ("<div class='small'>Gewig: <b>" + c.weight + " kg</b></div>") : ""}
          ${c.photo ? (`<img class="thumb" src="${c.photo}" alt="foto">`) : ""}
          ${c.notes ? ("<div class='small' style='margin-top:8px'>" + c.notes + "</div>") : ""}
          <button class="danger" type="button" onclick="deleteCatch(${i})" style="margin-top:10px">Delete</button>
        </div>
      `;
    });
  }

  function initMap(){
    const catches = JSON.parse(localStorage.getItem(KEY) || "[]");

    if(!window.L){
      alert("Map library het nie gelaai nie. Probeer reload.");
      return;
    }

    if(!window._fishMap){
      window._fishMap = L.map('mapBox').setView([-34.37, 21.42], 10);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(window._fishMap);
      window._fishMarkers = L.layerGroup().addTo(window._fishMap);
    }

    window._fishMarkers.clearLayers();

    const points = [];
    catches.forEach(c=>{
      if(!c.coords) return;
      const parts = c.coords.split(",");
      const lat = parseFloat(parts[0]);
      const lon = parseFloat(parts[1]);
      if(!Number.isFinite(lat) || !Number.isFinite(lon)) return;

      points.push([lat, lon]);
      L.marker([lat, lon]).addTo(window._fishMarkers)
        .bindPopup(`<b>${c.species || ""}</b><br>${c.date || ""}<br>${(c.place || "")}`);
    });

    if(points.length >= 2){
      window._fishMap.fitBounds(points, { padding:[20,20] });
    } else if(points.length === 1){
      window._fishMap.setView(points[0], 13);
    }
  }

  // init
  loadLog();
</script>
</body>
</html>

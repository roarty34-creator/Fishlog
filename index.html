<!DOCTYPE html>
<html lang="af">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FishLog</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    :root{
      --bg:#0b1220;
      --card:#162040;
      --text:#e7eefc;
      --brand:#2c5cff;
      --muted:rgba(231,238,252,.7);
      --danger:#ff3b3b;
      --line:rgba(255,255,255,.12);
    }
    body{ margin:0; font-family:Arial, system-ui, sans-serif; background:var(--bg); color:var(--text); }
    main{ padding:15px; max-width:650px; margin:auto; }
    nav{ display:flex; gap:8px; margin-bottom:10px; position:sticky; top:0; background:var(--bg); padding:10px 0; z-index:5; }
    button{
      padding:10px 14px; border-radius:10px; border:none; background:var(--brand); color:white;
      font-weight:600;
    }
    .secondary{ background:#3a3f50; }
    .danger{ background:var(--danger); }
    .card{ background:var(--card); padding:12px; border-radius:14px; margin-top:12px; border:1px solid var(--line); }
    input, select, textarea{
      width:100%; padding:10px; margin-top:6px; border-radius:10px; border:none; outline:none;
      background:#0f1730; color:var(--text);
    }
    label{ display:block; margin-top:10px; font-weight:700; }
    .row{ display:flex; gap:8px; align-items:center; }
    .small{ font-size:12px; color:var(--muted); margin-top:6px; }
    #map{ height:300px; margin-top:10px; border-radius:14px; overflow:hidden; border:1px solid var(--line); }
    img{ max-width:100%; border-radius:12px; margin-top:8px; border:1px solid var(--line); }
    hr{ border:none; border-top:1px solid var(--line); margin:12px 0; }
  </style>
</head>

<body>
<main>

  <nav>
    <button type="button" onclick="show('log')">Log</button>
    <button type="button" onclick="show('add')">Add</button>
    <button type="button" onclick="show('stats')">Stats</button>
  </nav>

  <!-- LOG -->
  <section id="log">
    <div class="card">
      <b>Filter</b>
      <div class="small">Kies ’n trip om net daai vangste te sien.</div>
      <select id="tripFilter"></select>
    </div>

    <div id="list"></div>
  </section>

  <!-- ADD -->
  <section id="add" style="display:none">
    <div class="card">
      <label>Spesie</label>
      <input id="species" placeholder="bv. Kabeljou" 

      <label>Lengte (cm)</label>
      <input id="length" type="number" inputmode="decimal" placeholder="bv. 78" />

      <label>Gewig (kg)</label>
      <input id="weight" type="number" inputmode="decimal" placeholder="bv. 6.5" />

      <label>Plek</label>
      <input id="place" placeholder="bv. Stilbaai / Goukou mond" />

      <label>Koördinate</label>
      <div class="row">
        <button type="button" class="secondary" onclick="getGPS()">Kry GPS</button>
        <input id="coords" placeholder="lat, lon" readonly />
      </div>
      <div class="small">Tip: GPS werk net as jou browser Location permission “Allow” is.</div>

      <label>Foto</label>
      <div class="row">
        <button type="button" onclick="document.getElementById('cam').click()">Camera</button>
        <button type="button" class="secondary" onclick="document.getElementById('gal').click()">Gallery</button>
      </div>
      <input id="cam" type="file" accept="image/*" capture="environment" hidden />
      <input id="gal" type="file" accept="image/*" hidden />
      <div id="photoPreview"></div>

      <label>Notas</label>
      <textarea id="notes" rows="3" placeholder="aas/lure, gety, wind, ens."></textarea>

      <div class="row" style="margin-top:12px">
        <button type="button" onclick="saveCatch()">Save</button>
        <button type="button" class="secondary" onclick="clearForm()">Clear</button>
      </div>

      <div id="status" class="small"></div>
    </div>

    <div id="map"></div>
  </section>

  <!-- STATS -->
  <section id="stats" style="display:none">
    <div class="card">
      <b>Stats</b>
      <div id="statsBox" class="small" style="margin-top:8px"></div>

      <hr>

      <div class="row">
        <button type="button" onclick="exportData()">Export Backup</button>
        <button type="button" class="secondary" onclick="document.getElementById('importFile').click()">Import Backup</button>
        <input type="file" id="importFile" accept="application/json" hidden />
      </div>
    </div>
  </section>

</main>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
(() => {
  const KEY = "fishlog";
  let editingId = null;
  let map = null;
  let pickedPhoto = null;

  const el = (id) => document.getElementById(id);
  const species = el("species");
  const trip = el("trip");
  const length = el("length");
  const weight = el("weight");
  const place = el("place");
  const coords = el("coords");
  const notes = el("notes");
  const photoPreview = el("photoPreview");
  const tripFilter = el("tripFilter");
  const status = el("status");

  function setStatus(msg){ status.textContent = msg || ""; }

  function show(id){
    document.querySelectorAll("section").forEach(s => s.style.display = "none");
    el(id).style.display = "block";

    if(id === "log") loadLog();
    if(id === "stats") renderStats();
  if(id === "add"){
  fillTripSelect();
  initMap();
  }

  function getAll(){
    return JSON.parse(localStorage.getItem(KEY) || "[]");
  }
  function saveAll(data){
    localStorage.setItem(KEY, JSON.stringify(data));
  }
function getTrips(){
  const data = getAll();
  const set = new Set();

  data.forEach(c => {
    if(c.trip) set.add(String(c.trip).trim());
  });

  set.add("Geen");
  return Array.from(set).filter(Boolean).sort();
}
}

function fillTripSelect(selected){
  const sel = document.getElementById("trip");
  if(!sel) return;

  const trips = getTrips();

  sel.innerHTML = trips
    .map(t => `<option value="${t}">${t}</option>`)
    .join("");

  if(selected && trips.includes(selected)){
    sel.value = selected;
  }  
} 
function newTrip(){
  const name = prompt("Naam van nuwe Trip?");
  if(!name) return;
  fillTripSelect(name.trim());
}
  function clearForm(){
    editingId = null;
    species.value = "";
    trip.value = "";
    length.value = "";
    weight.value = "";
    place.value = "";
    coords.value = "";
    notes.value = "";
    pickedPhoto = null;
    photoPreview.innerHTML = "";
    setStatus("");
  }
  window.clearForm = clearForm;

  function saveCatch(){
    const data = getAll();

    const item = {
      id: editingId || Date.now().toString(),
      species: (species.value || "").trim(),
      trip: (trip.value || "Geen").trim(),
      length: length.value ? Number(length.value) : null,
      weight: weight.value ? Number(weight.value) : null,
      place: (place.value || "").trim(),
      coords: (coords.value || "").trim(),
      notes: (notes.value || "").trim(),
      photo: pickedPhoto || "",
      date: new Date().toLocaleDateString()
    };

    if(!item.species){
      alert("Voer asb 'n spesie in.");
      return;
    }

    if(editingId){
      const idx = data.findIndex(x => x.id === editingId);
      if(idx >= 0) data[idx] = item;
      editingId = null;
      setStatus("Updated ✅");
    } else {
      data.push(item);
      setStatus("Saved ✅");
    }

    saveAll(data);
    loadLog();
    renderStats();
    show("log");
  }
  window.saveCatch = saveCatch;

  function buildTripFilter(data){
    const trips = Array.from(new Set(data.map(x => x.trip || "Geen")));
    tripFilter.innerHTML = `<option value="__ALL__">All trips</option>` +
      trips.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join("");
  }

  function loadLog(){
    const list = el("list");
    const data = getAll();

    buildTripFilter(data);

    const filter = tripFilter.value || "__ALL__";
    const filtered = (filter === "__ALL__") ? data : data.filter(x => (x.trip || "Geen") === filter);

    if(!filtered.length){
      list.innerHTML = `<div class="card"><b>No catches yet.</b><div class="small">Gaan Add toe en save jou eerste catch.</div></div>`;
      return;
    }

    list.innerHTML = "";
    filtered.slice().reverse().forEach(c => {
      list.innerHTML += `
        <div class="card">
          <b>${escapeHtml(c.species || "")}</b> - ${escapeHtml(c.trip || "")}<br>
          ${(c.length ? `${c.length}cm ` : "")}${(c.weight ? `${c.weight}kg` : "")}<br>
          ${escapeHtml(c.place || "")}<br>
          ${escapeHtml(c.coords || "")}<br>
          ${c.photo ? `<img src="${c.photo}" alt="photo">` : ""}

          <div class="row" style="margin-top:10px">
            <button type="button" class="secondary" onclick="editCatch('${c.id}')">Edit</button>
            <button type="button" class="danger" onclick="deleteCatch('${c.id}')">Delete</button>
          </div>

          <div class="small">${escapeHtml(c.date || "")}</div>
        </div>
      `;
    });
  }
  window.loadLog = loadLog;

  function editCatch(id){
    const data = getAll();
    const c = data.find(x => x.id === id);
    if(!c){
      alert("Catch nie gevind nie.");
      return;
    }

    editingId = id;
    species.value = c.species || "";
    trip.value = c.trip || "";
    length.value = (c.length ?? "");
    weight.value = (c.weight ?? "");
    place.value = c.place || "";
    coords.value = c.coords || "";
    notes.value = c.notes || "";
    pickedPhoto = c.photo || "";
    photoPreview.innerHTML = pickedPhoto ? `<img src="${pickedPhoto}" alt="photo">` : "";
    setStatus("Editing… ✏️");

    show("add");
  }
  window.editCatch = editCatch;

  function deleteCatch(id){
    if(!confirm("Delete hierdie catch?")) return;
    const data = getAll().filter(x => x.id !== id);
    saveAll(data);
    loadLog();
    renderStats();
  }
  window.deleteCatch = deleteCatch;

  function renderStats(){
    const data = getAll();
    const box = el("statsBox");

    if(!data.length){
      box.innerHTML = "No catches yet.";
      return;
    }

    const total = data.length;
    let biggest = 0;
    data.forEach(c => {
      if(typeof c.length === "number" && c.length > biggest) biggest = c.length;
    });

    box.innerHTML = `
      Total catches: <b>${total}</b><br>
      Biggest length: <b>${biggest || 0}</b> cm
    `;
  }
  window.renderStats = renderStats;

  function getGPS(){
    if(!navigator.geolocation){
      alert("GPS nie beskikbaar nie.");
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => {
        const lat = pos.coords.latitude.toFixed(6);
        const lon = pos.coords.longitude.toFixed(6);
        coords.value = `${lat}, ${lon}`;
      },
      err => {
        alert("Kon nie ligging kry nie. Check Location permission (Allow).");
      },
      { enableHighAccuracy:true, timeout:10000, maximumAge:0 }
    );
  }
  window.getGPS = getGPS;

  function handlePhoto(e){
    const file = e.target.files && e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = () => {
      pickedPhoto = reader.result;
      photoPreview.innerHTML = `<img src="${pickedPhoto}" alt="photo">`;
    };
    reader.readAsDataURL(file);
  }

  el("cam").addEventListener("change", handlePhoto);
  el("gal").addEventListener("change", handlePhoto);

  function initMap(){
    if(map) return;
    map = L.map("map").setView([-34.37, 20.85], 10);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(map);
  }
  window.initMap = initMap;

  function exportData(){
    const data = localStorage.getItem(KEY);
    if(!data){
      alert("Geen data om te export nie.");
      return;
    }
    const blob = new Blob([data], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "fishlog-backup.json";
    a.click();
    URL.revokeObjectURL(url);
  }
  window.exportData = exportData;

  el("importFile").addEventListener("change", function(e){
    const file = e.target.files && e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(){
      try{
        const data = JSON.parse(reader.result);
        if(!Array.isArray(data)) throw new Error("not array");
        saveAll(data);
        alert("Backup suksesvol ingevoer!");
        fillTripSelect();
loadLog();
        renderStats();
        show("log");
      }catch{
        alert("Ongeldige backup file.");
      }
    };
    reader.readAsText(file);
  });

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, m => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  // start
fillTripSelect();
loadLog();
show("log");

window.show = show;
})(); 
</script>
</script>
  window.show = show;
</body>
</html>
